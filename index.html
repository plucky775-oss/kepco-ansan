s": ["제41조", "역송전력요금의 구분", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제42조", "title": "보완전력요금의 계산", "page": 24, "text": "①보완전력요금은다음각호의기본요금, 전력량요금, 기후환경요금및연료비조정요금의합계액으로합니다.1. 기본요금사용전력량유무에관계없이요금적용전력에대하여보완공급개시일부터적용하는요금을말합니다.2. 전력량요금, 기후환경요금및연료비조정요금사용전력량이있는경우사용전력량에대하여부과하는요금을말합니다. 21 ②보완전력요금은 1 보완공급계약에대하여 1 개월마다다음각호의요율에따라계산합니다.1. 기본요금과전력량요금은별표 1(보완전력요금표)의해당요금단가에따라계산합니다.2. 기후환경요금은사용전력량에대하여 별표 7[기후환경 요금운영지침]에따라계산된기후환경요금단가를곱하여계산합니다.3. 연료비조정요금은사용전력량에대하여 별표 8(연료비 조정요금운영지침)에따라계산된연료비조정단가를곱하여계산 합니다. ③요금적용전력은검침당월을포함한직전 12 개월의각월분및당월분으로한전이고지한전기요금청구서상의사용기간중가장큰최대수요전력으로하며, 최대수요전력이계약전력의 30%미만인경우에는계약전력의 30%해당전력을요금적용전력으로합니다.(단, 지역냉난방구역전기사업자의경우전기사업법시행령제 19 조제 4 항제 3 호의해당기간은제외함)④예비보완공급설비를설치한고객에대한요금계산은 제 63 조[예비전력]의규정을준용합니다.", "keywords": ["제42조", "보완전력요금의 계산", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제42조의2", "title": "초과요금", "page": 25, "text": "①최대수요전력이계약전력을초과한첫번째달에는고객에게계약전력을증설토록안내하고초과요금을적용하지아니하나, 계약전력을초과한첫번째달로부터 3 년이내에최대수요전력이다시계약전력을초과하거나최종초과요금을부과한월로부터 3 년이내에최대수요전력이다시계약전력을초과할경우에는계약전력을초과하는부분에대하여해당월분기본요금단가의 150%를추가하여초과요금을받습니다. 다만, 보완공급설비의고장또는휴전작업등고객의책임이아닌사유로계약전력이초과된경우에는초과요금을적용하지않습니다. ②고객의월간보완전력사용량이고객의구역전기사업지구내월간판매전력량대비일정비율을초과하는경우보완공급계약체결일을기준으로아래각호에따라초과요금을부과합니다.1. 2024 년 12 월 31 일이전구역전기사업허가고객 22 가. 월간보완전력사용량중구역전기사업지구내월간판매전력량의 40%초과 70%이하의초과사용량(A), 고객의해당월전력량요금의kWh당평균단가+기후환경요금단가+연료비조정단가(X)·초과요금=A×X×5%나. 월간보완전력사용량중구역전기사업지구내월간판매전력량의 70%를초과하는사용량(B)·초과요금=B×X×10%2. 2025 년 1 월 1 일이후구역전기사업신규허가또는전기설비용량증설로인한변경허가를받은고객가. 월간보완전력사용량중구역전기사업지구내월간판매전력량의 30%초과 65%이하의초과사용량(C), 고객의해당월전력량요금의kWh당평균단가+기후환경요금단가+연료비조정단가(X)·초과요금=C×X×10%나. 월간보완전력사용량중구역전기사업지구내월간판매전력량의 65%초과 100%이하의초과사용량(D)·초과요금=D×X×20%③제 2 항의구역전기사업지구내월간판매전력량은다음의기준에따라산정합니다.·월간판매전력량=월간보완전력사용량＋월간발전량-월간역송전력량 ④보완전력의상용전력과예비전력의계약전력이다른경우로서예비전력의최대수요전력이예비전력의계약전력을초과한때에는그초과분에대하여예비전력(갑)은해당계약종별기본요금단가의 5%(고객소유선로로공급받는고객은 2%), 예비전력(을)은해당계약종별기본요금단가의 10%(고객소유선로로공급받는고객은 6%)를초과요금으로부과한다.", "keywords": ["제42조의2", "초과요금", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제42조의3", "title": "초과요금 면제 및 완화조건", "page": 26, "text": "제 42 조의 2 의제 2 항의초과요금은다음의기준에따라초과요금을면제하거나적용기준을완화합니다. ①지역냉난방구역전기사업자가전기사업법시행령제 19 조제 4 항제 3 호에 23 따라산업통상자원부장관이지정한기간동안한전과보완공급계약을유지하는경우해당기간의초과요금은면제합니다. ②고객이발전기를시운전·고장·예방정비중인해당월분의초과요금은면제합니다. 이경우고객은시운전·고장·예방정비해당기간을한전에통보하여야합니다. ③여름철또는겨울철의전력수급비상시해당계절의모든비상급전지시에고객이발전기를응동하는경우다음의기준에따라초과요금을면제합니다. 비상급전지시에따른발전기응동기간초과요금면제대상여름철올해 7～9 월올해 10 월분～올해 12 월분겨울철올해 12～다음해 2 월다음해 3 월분～다음해 5 월분단, 겨울철(올해 12～다음해 2 월)비상급전지시에발전기를응동(부분적응동포함)하는해당월분초과요금은면제합니다. ④고객의연간보완전력사용량(지역냉난방구역전기사업자의경우전기사업법시행령제 19 조제 4 항제 3 호에따라산업통상자원부장관이지정한기간은제외)이고객의구역전기사업지구내해당기간판매전력량의 40%이하인경우다음년도초과요금은다음의기준에따라부과합니다.·월간보완전력사용량중구역전기사업지구내월간판매전력량의 70%를초과하는사용량×(고객의해당월전력량요금의kWh당평균단가+기후환경요금단가+연료비조정단가)×5%단,2025 년 1 월 1 일이후구역전기사업신규허가또는전기설비용량증설로인한변경허가를받은고객에게는이조항을적용하지않습니다. ⑤해당연도에상업운전을개시한고객의경우제 4 항의연간보완전력사용량·구내판매전력량(지역냉난방구역전기사업자의경우전기사업법시행령제 19 조제 4 항제 3 호에따라산업통상자원부장관이지정한기간은제외)은상업운전개시일다음달부터산정합니다. 24", "keywords": ["제42조의3", "초과요금 면제 및 완화조건", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제42조의4", "title": "보완전력요금 요율조정 원칙", "page": 28, "text": "보완전력요금의총괄원가회수율{(판매단가÷총괄원가)×100}이 95%미만이거나 105%를초과하는경우에는보완전력요금총괄원가수준으로보완전력요금의요율을고객과협의하여조정하는것을원칙으로합니다.", "keywords": ["제42조의4", "보완전력요금 요율조정 원칙", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제43조", "title": "역송전력요금의 계산", "page": 28, "text": "역송전력요금은전력량요금으로하며 1 보완공급계약에대하여 1 개월단위로별표 2[역송전력요금산정기준]의규정에따라계산합니다.", "keywords": ["제43조", "역송전력요금의 계산", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제44조", "title": "검침일 및 요금의 계산기간", "page": 28, "text": "①보완전력및역송전력에대한검침은한전과고객이매월말일(이하“정기검침일”이라합니다)에실시하는것을원칙으로합니다. 다만, 비상재해등의부득이한경우에는정기검침일이아닌날에검침할수있습니다. ②보완공급요금의계산은전월검침일부터당월검침일전일까지의기간(이하“검침기간”이라합니다)을기준으로하며, 제 52 조[일수계산]의경우를제외하고는검침기간을 1 개월로봅니다.", "keywords": ["제44조", "검침일 및 요금의 계산기간", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제45조", "title": "전력량 등의 계량", "page": 28, "text": "①유효전력량(㎾h), 무효전력량(kVarh)및최대수요전력(㎾)(이하“전력량등”이라합니다)은검침일에전기계기에계량된값으로하며, 보완전력과역송전력을별도로구분하여계량합니다. ②전력량등은수급지점에서수급지점의전압과같은전압으로계량하는것을원칙으로하며, 부득이한사유로수급지점이외의지점또는수급지점의전압과다른전압으로계량할경우에는다음각호와같이전력손실을부담합니다.1. 수급지점이외의지점에서수급지점의전압과같은전압으로계량하는경우(제 3 호에해당되는경우를제외합니다)에는수급지점에서계량점까지의전력손실은한전이부담합니다.2. 고객의사정으로수급지점의전압과다른전압으로계량하는경우의 25 전력손실은고객이부담합니다.3. 수급지점이한전변전소구내로결정된고객이고객구내에전력량계를설치하여계량하는경우에는수급지점에서계량점까지의전력손실은고객이부담합니다.", "keywords": ["제45조", "전력량 등의 계량", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제46조", "title": "전력량 등의 협의결정", "page": 29, "text": "보완전력량및역송전력량을계량하기위해설치된계기가다음중의하나에해당하는경우에는요금계산기간의보완공급전력량을고객과한전이협의하여결정합니다.1. 전기계기의이상(異常)·고장등으로보완공급전력량이정확히계량되지않았을경우 2. 전력량계의시간이표준시간과±15 분이상차이나는경우 3. 계절이변할때전력량계의표시일이별표 1[보완전력요금표]및별표 2[역송전력요금산정기준]에서규정한계절변경일과±1 일이상차이나는경우", "keywords": ["제46조", "전력량 등의 협의결정", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제47조", "title": "보완공급요금의 납부의무 및 납기일", "page": 29, "text": "①고객과한전의보완공급요금의납부의무는다음에서정한날에납부의무가발생합니다.1. 보완공급이개시된경우에는검침일 2. 보완공급계약이해지된경우에는해지일 ②보완전력요금은제 1 항의납부의무발생일다음날부터한전이지정한날(이하“납기일”이라합니다)까지납부해야합니다. 이경우한전은납기일의 7 일전까지보완전력요금청구서를고객에게송달합니다. ③역송전력요금은고객이매월 10 일까지전월요금을한전에청구하고한전은제 2 항의보완전력요금납기일까지고객에게납부합니다.", "keywords": ["제47조", "보완공급요금의 납부의무 및 납기일", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제47조의2", "title": "보완전력요금에 대한 이의신청", "page": 29, "text": "고객은한전을방문하거나우편, 팩시밀리, 인터넷, 전화의방법으로요금청구내역에대해이의를신청할수있으며, 한전은이의신청을받은날로부터 30 일이내에이에대한결과를고객에게통지합니다. 26", "keywords": ["제47조의2", "보완전력요금에 대한 이의신청", "보완공급약관(2026.03.16부)", "신청", "접수", "계약", "approval", "요금", "청구", "납부", "연체", "이의신청", "objection", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제48조", "title": "연체료", "page": 30, "text": "고객또는한전이보완공급요금을제 47 조[보완공급요금의납부의무및납기일]의규정에의한납기일을경과하여납부하는경우에는납기일다음날부터납부일까지다음각호의요율로일수계산하여연체료를부담해야하며, 연체료는다음달에청구하는보완공급요금에가산하여청구할수있습니다.1. 처음 1 개월: 미납요금×1. 5%×월력月曆일수연체일수", "keywords": ["제48조", "연체료", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제49조", "title": "요금의 재산정", "page": 30, "text": "한전및고객이보완공급요금을잘못산정하였을경우에는다시산정한보완공급요금과잘못산정한보완공급요금의차액을당월분보완공급요금에서가감하는것을원칙으로하며, 보완공급요금을다시산정한경우에도보완공급요금의납기일은변경되지않습니다.", "keywords": ["제49조", "요금의 재산정", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제50조", "title": "보완공급요금 등의 납부방법", "page": 30, "text": "①고객은보완전력요금및시설부담금등을한전이지정한수납기관에납부해야합니다. ②고객이희망하는경우에는한전에미리신청한후금융기관의고객예금계좌로부터한전지정예금계좌로의이체에의하여보완전력요금을납부할수있습니다. ③고객이제 1 항및제 2 항의규정에의하여보완전력요금, 시설부담금등을한전이지정한수납기관에납부하는경우에는그수납기관에입금한날, 계좌이체의경우에는고객예금계좌에서인출되는날에보완전력요금을납부한것으로봅니다. ④한전은역송전력요금을고객이지정한수납기관에납부하거나금융기관의한전예금계좌로부터고객지정예금계좌로의이체에의하여납부해야하며, 역송전력요금을지정한수납기관에납부하는경우에는그수납기관에입금한날, 계좌이체의경우에는한전예금계좌에서인출되는날에역송전력요금을납부한것으로봅니다. 27", "keywords": ["제50조", "보완공급요금 등의 납부방법", "보완공급약관(2026.03.16부)", "요금", "청구", "납부", "연체", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제51조", "title": "보증금", "page": 31, "text": "①한전은고객이다음중의하나에해당할때에는보완공급의개시, 재공급, 계속공급의조건으로예상월액보완전력요금의 3 개월분(보완전력요금납부실적이있는경우에는최근 3 개월보완전력요금으로합니다)에상당하는금액을기준으로보증금을예치하게할수있습니다. 다만, 고객이희망할경우에는이행보증보험에의한보증, 지급보증, 연대보증, 근저당의설정등으로보증금을대신할수있습니다.1. 보완전력요금미납으로제 15 조[고객의책임으로인한보완공급계약의해지]제 1 항의규정에의해보완공급계약의해지가있었던고객 2. 신용상태불량등으로보완전력요금납부에대한보증이필요한고객 ②보증금의예치또는보증기간은 2 년이내로합니다. 다만, 제 1 항제 2 호의고객은신용상태회복인지일또는보완공급계약해지일로합니다. ③현금으로예치한보증금은이자를지급하며, 이자율은아래와같이적용합니다.1. 예치기간이 2 년미만인경우에는시중은행 1 년만기정기예금이자율변동기간별평균이자율을, 예치기간이 2 년이상인경우에는시중은행 2 년만기정기예금이자율변동기간별평균이자율을적용합니다.2. 보증기간만료후의예치기간에대하여는시중은행보통예금이자율을적용합니다.3. 제 1 호및제 2 호의이자율은매년 6 월과 12 월에산정후다음달 1 일부터적용합니다. ④보증금을현금으로예치하였을경우보완공급계약이해지되었을때에는미납보완전력요금및연체료등보완공급과관련한미납금액을공제하고남은금액을반환합니다. 미납보완전력요금및연체료등이보증금을초과할경우에는그초과액을고객이추가로납부하여야합니다.", "keywords": ["제51조", "보증금", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제52조", "title": "일수계산(日數計算", "page": 31, "text": ")①한전은다음중의하나에해당하는경우에는보완공급요금을사용일수 28 에따라구분계산합니다.1. 보완공급의신규·변경·해지·해지후재공급하는경우 2. 보완전력요금표의요율또는역송전력요금산정기준이변경되는경우 3. 정기검침일이변경되거나정기검침일로부터 5 일이상변경하여검침하는경우 ②사용일수는공급개시일은포함하고해지일은제외하여계산하며, 보완전력요금표의요율또는역송전력요금산정기준에변경이있는경우는변경이있는날부터변경후의요율또는기준을적용합니다. 29", "keywords": ["제52조", "일수계산(日數計算", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제53조", "title": "공사비 부담의 일반원칙 및 시설부담금", "page": 33, "text": "①고객이새로이보완공급을신청하거나계약전력을증가시키는경우또는고객의희망에따라보완공급설비를변경하는경우에해당전력공급설비는전기사업법시행령제 19 조제 4 항제 3 호에의거산업통상자원부장관이지정한기간동안전력시장과의전력거래여부와관계없이보완공급설비로간주하여해당공사비를고객이부담합니다. ②제 1 항의규정에따라고객이부담할금액은실제소요되는총시설부담금에서해당고객이사용하지않은부분을제외하여산정한금액(이하“설계조정시설부담금”이라합니다)으로하며, 구체적인산정방법은 제 97 조[22,900V특별고압설계조정시설부담금]의규정을준용합니다. 다만, 다음중하나에해당하는경우에는실제소요되는금액(이하“설계시설부담금”이라합니다)을부담합니다.1. 특정고객이전용하기위한보완공급설비및예비보완공급설비 2. 고객의희망에따라기술기준또는한전설계기준등을초과하여설치하는보완공급설비 3. 22,900V를초과하는특별고압으로설치하는보완공급설비 4. 고객이한전에역송전력을공급함에따라추가로설치해야하는보호장치등의관련설비설치비", "keywords": ["제53조", "공사비 부담의 일반원칙 및 시설부담금", "보완공급약관(2026.03.16부)", "시설부담금", "공사비", "contribution", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제54조", "title": "시설부담금의 납부 및 정산", "page": 33, "text": "①시설부담금은보완공급설비공사착수전에그전액을납부해야합니다. 다만, 시설부담금납부가명확히예상되고한전이필요하다고인정하는경우에는보완공급개시일전까지분할하여납부할수있습니다. ②한전은공사준공후시설부담금을정산합니다. ③보완공급설비의일부또는전부를설치한후고객의사정으로보완공급을개시하지않고계약을해지또는변경하였을경우와공사를하지않았을때라도측량, 설계등의비용이발생하였을경우에는한전은이미받은시설부담금에서설비의설치및철거에소요된비용과기타 30 발생비용을차감한후그잔액을고객에게환불합니다. ④한전이보완공급시설부담금정산차액을고객에게환불하는경우에는환불대상금액에그동안의이자(利子)를가산하여환불하며, 이자계산은제 51 조[보증금]제 3 항을준용합니다. 다만, 고객의사유로보완공급계약을해지또는변경함에따라보완공급시설부담금을환불하는경우에는이자를가산하지않습니다. 31 부 칙 ①(시행일)이약관은 2005 년 2 월 1 일부터시행합니다. ②( function normalize(str){ return String(str || '').toLowerCase().normalize('NFKC'); }
function clauseNormalize(c){ return String(c || '').replace(/\s+/g,'').toLowerCase(); }

function expandQuery(q){
  let out = normalize(q);
  ALIAS.forEach(rule => {
    if (rule.patterns.some(p => out.includes(normalize(p)))) out += ' ' + rule.add;
  });
  return out;
}

function tokenise(q){
  return Array.from(new Set(expandQuery(q).split(/[\s,.;:!?()\/\[\]'"“”‘’]+/).map(s => s.trim()).filter(s => s.length >= 2)));
}

function topicHint(q){
  const s = expandQuery(q);
  const pairs = [
    ['명의변경',['명의','계약자 변경','사용자 변경','name change','titular','смена','đổi tên','名义']],
    ['해지',['해지','disconnect','termination','cancel','解约','расторжение','chấm dứt']],
    ['임시전력',['임시전력','temporary','construction','site power','临时','временное','tạm thời']],
    ['요금',['요금','bill','payment','late fee','factura','счет','hóa đơn','账单']],
    ['이의',['이의','objection','appeal','reclamación','возражение','khiếu nại','异议']],
    ['시설부담금',['시설부담금','facility charge','contribution','cargo','взнос','phí cơ sở','负担金']],
    ['보완공급',['보완공급','supplementary','reverse power','역송','complementario','дополнитель','bổ sung','补充']],
    ['전압',['전압','voltage','frequency','voltaje','напряжение','điện áp','电压']],
    ['안전',['안전','safety','boundary','responsibility','безопасность','an toàn','安全']],
    ['신청',['신청','application','apply','solicitud','заяв','đăng ký','申请']]
  ];
  for (const pair of pairs){
    if (pair[1].some(x => s.includes(normalize(x)))) return pair[0];
  }
  return null;
}

function scoreEntry(q, entry){
  const nq = expandQuery(q);
  const tokens = tokenise(q);
  let score = 0;
  const title = normalize(entry.title);
  const text = normalize(entry.text);
  const doc = normalize(entry.docName);
  const clause = clauseNormalize(entry.clause);

  const qClauseMatch = q.match(/제\s*(\d+)\s*조(?:의\s*(\d+))?/);
  if (qClauseMatch) {
    const qc = ('제' + qClauseMatch[1] + '조' + (qClauseMatch[2] ? ('의' + qClauseMatch[2]) : '')).toLowerCase();
    if (clause === qc) score += 120;
  }
  if (nq.includes(clause)) score += 80;
  if (entry.title && nq.includes(normalize(entry.title))) score += 30;
  if (nq.includes('시행세칙') && entry.doc === 'sechik') score += 35;
  if (nq.includes('보완공급') && entry.doc === 'supp') score += 20;
  if (nq.includes('기본공급약관') && entry.doc === 'basic') score += 20;

  (entry.keywords || []).forEach(kw => {
    const nkw = normalize(kw);
    if (nkw && nq.includes(nkw)) score += 12;
  });
  tokens.forEach(token => {
    if (title.includes(token)) score += 10;
    if (doc.includes(token)) score += 6;
    if (text.includes(token)) score += 2;
  });
  return score;
}

function search(q){
  return KB.map(e => Object.assign({}, e, {_score: scoreEntry(q, e)}))
    .filter(e => e._score > 0)
    .sort((a,b) => b._score - a._score || String(a.clause).localeCompare(String(b.clause), 'ko'))
    .slice(0, 6);
}

function maybeSummary(q){
  const topic = topicHint(q);
  if (!topic) return '';
  const pack = TOPIC_SUMMARIES[state.lang] || TOPIC_SUMMARIES.ko;
  return pack[topic] || '';
}

  if (!raw) return [];
  if (raw.length <= 220) return [raw];
  const bits = raw.split(/(?=①|②|③|④|⑤|⑥|⑦|⑧|⑨|⑩|1\.|2\.|3\.|4\.|5\.)/).map(s => s.trim()).filter(Boolean);
  if (bits.length <= 1) {
    const out = [];
    for (let i = 0; i < raw.length; i += 220) out.push(raw.slice(i, i + 220));
    return out;
  }
  const out = [];
  let cur = '';
  bits.forEach(part => {
    const next = cur ? (cur + ' ' + part) : part;
    if (next.length > 220 && cur) { out.push(cur); cur = part; }
    else cur = next;
  });
  if (cur) out.push(cur);
  return out;
}
async function fetchTranslatedChunk(text, targetLang){
  const lang = RUNTIME_LANG_MAP[targetLang] || targetLang;
  const key = lang + '::' + text;
  if (translationCache[key]) return translationCache[key];
  const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=ko|' + encodeURIComponent(lang);
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('translation http error');
  const data = await resp.json();
  const translated = (((data || {}).responseData || {}).translatedText || '').replace(/&quot;/g, '"').replace(/&#39;/g, "'").trim();
  if (!translated) throw new Error('translation empty');
  translationCache[key] = translated;
  return translated;
}
async function translateTextRuntime(text, targetLang){
  if (!text) return '';
  if (targetLang === 'ko') return text;
  const parts = splitForTranslation(text);
  const translatedParts = [];
  for (const part of parts) translatedParts.push(await fetchTranslatedChunk(part, targetLang));
  return translatedParts.join(' ');
}
async function hydrateTranslations(results){
  if (state.lang === 'ko') return;
  await Promise.all(results.map(async (entry, idx) => {
    const titleEl = document.getElementById('translated-title-' + idx);
    const bodyEl = document.getElementById('translated-body-' + idx);
    if (!titleEl || !bodyEl) return;
    try {
      const translatedTitle = await translateTextRuntime((entry.clause ? (entry.clause + ' ') : '') + entry.title, state.lang);
      const excerpt = entry.text.length > 520 ? entry.text.slice(0, 520) + '…' : entry.text;
      const translatedBody = await translateTextRuntime(excerpt, state.lang);
      titleEl.textContent = translatedTitle;
      bodyEl.textContent = translatedBody;
    } catch (err) {
      titleEl.textContent = (entry.clause ? (entry.clause + ' ') : '') + entry.title;
      bodyEl.textContent = rt('failed') + '\n\n' + (entry.text.length > 520 ? entry.text.slice(0, 520) + '…' : entry.text);
    }
  }));
}

function formatEntry(entry, idx){
  const pageLabel = entry.page === 'web' ? t('web') : (t('page') + ' ' + entry.page);
  const sourceLabel = entry.docName;
  const label = entry.clause ? (entry.clause + ' ' + entry.title) : entry.title;
  const excerpt = entry.text.length > 520 ? entry.text.slice(0, 520) + '…' : entry.text;
  const links = [];
  if (entry.doc === 'basic' || entry.doc === 'appendix_basic') links.push('<a class="link-btn" href="basic_supply_terms_260401.pdf" target="_blank" rel="noopener">' + escapeHtml(t('viewPdf')) + '</a>');
  if (entry.doc === 'supp' || entry.doc === 'appendix_supp') links.push('<a class="link-btn" href="supplementary_supply_terms_20260316.pdf" target="_blank" rel="noopener">' + escapeHtml(t('viewPdf')) + '</a>');
  if (entry.officialLink) links.push('<a class="link-btn" href="' + entry.officialLink + '" target="_blank" rel="noopener">' + escapeHtml(t('viewOfficial')) + '</a>');
  return '<div class="result-card"><h4>' + escapeHtml(label) + '</h4><div class="result-meta"><span class="pill">' + escapeHtml(t('source')) + ': ' + escapeHtml(sourceLabel) + '</span><span class="pill">' + escapeHtml(pageLabel) + '</span></div><div class="excerpt"><strong>' + escapeHtml(t('original')) + '</strong><br>' + escapeHtml(excerpt) + '</div><div class="links">' + links.join('') + '</div></div>';
}

function askQuestion(rawQ){
  const q = String(rawQ || '').trim();
  if (!q) return;
  addMessage('user', q);
  const results = search(q);
  if (!results.length) {
    addMessage('bot', t('notFound'));
    return;
  }
  const summary = maybeSummary(q);
  let html = '<div><strong>' + escapeHtml(results.length > 1 ? t('resultLeadMulti') : t('resultLead')) + '</strong>';
  if (summary) html += '<div class="help" style="margin-top:10px;">' + escapeHtml(summary) + '</div>';
  if (results.some(r => r.doc === 'sechik')) html += '<div class="note">' + escapeHtml(t('partialNote')) + '</div>';
  html += '</div>';
  results.forEach((r, idx) => { html += formatEntry(r, idx); });
  addHtmlCard(html);
  hydrateTranslations(results);
}

document.getElementById('askBtn').addEventListener('click', () => askQuestion(document.getElementById('q').value));
document.getElementById('resetBtn').addEventListener('click', () => {
  const box = document.getElementById('chatbox');
  box.innerHTML = '';
  const intro = document.createElement('div');
  intro.className = 'msg bot';
  intro.id = 'introMsg';
  intro.textContent = t('intro');
  box.appendChild(intro);
  document.getElementById('q').value = '';
});
document.getElementById('q').addEventListener('keydown', (e) => { if (e.key === 'Enter') askQuestion(document.getElementById('q').value); });
document.getElementById('langSelect').addEventListener('change', (e) => { state.lang = e.target.value; renderStatic(); });

renderStatic();
</script>
