const KB = [{"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제1조", "title": "목적", "page": 9, "text": "이 (이하 “약관”이라 합니다)은 전기사업법 제 16 조(전기의 공급약관)에 따라 한국전력공사(이하 “한전”이라 합니다)가 전기를 사용하는 자 또는 사용하고자 하는 자(이하 “고객”이라 합니다)에게 전기를 공급할 때의 요금 및 기타 공급조건을 정하는 것을 목적으로 합니다.", "keywords": ["제1조", "목적", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제2조", "title": "적용구역", "page": 9, "text": "이 약관은 산업통상자원부장관의 허가를 받은 공급구역에 적용합니다.", "keywords": ["제2조", "적용구역", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제3조", "title": "약관의 인가 및 변경", "page": 9, "text": "① 이 약관은 전기위원회의 심의를 거쳐 산업통상자원부장관의 인가를 받은 것입니다. ② 한전은 산업통상자원부장관의 인가 또는 명령에 따라 이 약관을 변경할 수 있습니다. 이 때 요금 및 기타 공급조건은 변경한 약관을 따릅니다.", "keywords": ["제3조", "약관의 인가 및 변경", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제4조", "title": "시행세칙", "page": 9, "text": "① 이 약관의 시행에 필요한 세부사항은 약관의 취지에 따라 시행세칙(이하 “세칙”이라 합니다)으로 정하며, 약관과 세칙에 명시하지 않은 사항은 고객과 한전이 협의하여 결정합니다. ② 전기요금이나 시설부담금의 인상, 전기요금이나 보증 등의 감면요건의 삭제, 계약종별 적용기준의 불리한 변경 등 중요한 세칙 변경사항에 대하여는 한전이 사전에 산업통상자원부장관과 협의합니다.", "keywords": ["제4조", "시행세칙", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제5조", "title": "약관 이외의 공급조건의 적용", "page": 9, "text": "① 한전은 특별한 사정이 있는 경우 산업통상자원부장관의 인가를 받아 이 약관 이외의 공급조건을 적용할 수 있습니다. ② 한전은 천재지변 등 불가피한 경우 재해복구를 위하여 사용하는 전력에는 이 약관 이외의 공급조건을 적용할 수 있습니다.", "keywords": ["제5조", "약관 이외의 공급조건의 적용", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제6조", "title": "정의", "page": 10, "text": "이 약관에서 사용하는 용어의 정의는 다음 각 호와 같습니다.1. 변전소(變電所)구외(構外)로부터 보내오는 전기를 구내에 시설한 변압기 등으로 전압을 높이거나 낮추어 다시 구외로 보내는 장소로서, 한전이 소유하는 것을 말합니다.2. 송전선로(送電線路)발전소 상호간, 변전소 상호간 또는 발전소와 변전소간의 전선로(통신전용선을 제외합니다)와 이에 속하는 개폐소 및 기타 전기설비로서 한전이 소유하는 것을 말합니다.3. 배전선로(配電線路)발전소, 변전소 또는 송전선로에서 다른 발전소나 변전소를 거치지 않고 수급지점에 이르는 전선로와 이에 속하는 개폐장치, 변압기 및 기타 전기설비로서 한전이 소유하는 것을 말합니다.4. 전선로발전소, 변전소, 개폐소 등에서 전기사용장소간에 이르는 전선과 전선을 지지하는 것을 주된 목적으로 하는 설비를 말합니다.5. 지지물전선 및 약전류전선을 지지하는 것을 주된 목적으로 하는 설비로서 목주, 철주, 콘크리트주, 강관주, 철탑 등의 전기설비를 말합니다.6. 인입선공중 및 지중 전선로의 지지물로부터 다른 지지물을 거치지 않고 전기사용장소의 연결점이나 인입구(引入口)에 이르는 전선을 말합니다. 7. 사용설비(使用設備)전력을 소비하는 고객소유 전기기기로서 전기사용계약으로 정한 것을 말합니다.8. 변압기설비(變壓器設備)고객소유 수전변압기와 이에 속하는 개폐기 등의 전기 설비로서 전기사용계약으로 정한 것을 말합니다.9. 계약전력(契約電力) 변압기, 사용설비 또는 최대수요전력을 기준으로 고객과 한전이 협의하여 산정된 용량을 기준으로 계약한 최대전력을 말합니다. 10. 최대수요전력(最大需要電力)최대수요전력을 계량할 수 있는 전력량계에 의하여 15 분 단위로 누적 계산되는 전력을 말합니다.11. 요금적용전력(料金適用電力)기본요금 계산의 기준이 되는 전력을 말합니다.12. 일반공급설비(一般供給設備)일반 다수 고객에게 전기를 공급하기 위하여 설치하는 한전소유 공급설비를 말합니다.13. 전용공급설비(專用供給設備)특정 고객에게만 전기를 공급하기 위한 한전소유 공급설비를 말합니다.14. 특별공급설비(特別供給設備)전용공급설비, 고객의 희망에 따라 기술기준이나 한전 설계기준 등을 초과하여 시설하는 공급설비, 22,900V를 초과하는 특별고압으로 시설하는 공급설비로서 한전이 소유하는 것을 말합니다.15. 시설부담금(施設負擔金)고객이 새로 전기를 사용하거나 계약전력을 증가시키는 경우, 공급방식·공급전압 등을 변경하거나 기존의 한전의 공급설비를 보강·이용·철거하는 경우에 발생하는 배전선로 공사비 중 고객이 부담하는 금액을 말합니다.16. 표준시설부담금(標準施設負擔金)일반공급설비로 전기를 공급받는 고객에게 적용하는 시설부담금으로서 공사발생 유무나 공사내역에 관계없이 계약전력과 공사거리에 따라 일정한 단가를 적용하여 산정한 것을 말합니다.17. 설계시설부담금(設計施設負擔金)특별공급설비로 전기를 공급받는 고객 등에게 적용하는 시설부담금으로서 해당 고객에게 전기를 공급하기 위한 공사의 설계금액 기준으로 산정한 것을 말합니다.18. 설계조정시설부담금(設計調整施設負擔金)표준시설부담금 또는 설계시설부담금을 적용하는 것이 부적당한 경우에 적용하는 시설부담금으로서 해당 고객에게 전기를 공급하기 위한 공사의 설계금액에 해당 고객의 이용률을 고려하여 조정 산정한 것을 말합니다.19. 임시전력(臨時電力)흥행·임시집회·전람회·재해복구·건설공사 및 그 밖의 이와 유사한 용도에 일정기간만 사용하는 전력을 말합니다. 20. 임시공급설비(臨時供給設備) 임시전력을 공급하기 위한 한전소유 공급설비를 말합니다.21. 예비전력(豫備電力)상용공급설비의 보수, 사고 등으로 전력이 공급되지 않을 때 상용전력(常用電力)", "keywords": ["제6조", "정의", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제7조", "title": "끝수 계산", "page": 12, "text": "① 요금 등을 계산하는 단위는 다음과 같습니다. 이 때 계산단위 미만의 끝수는 계산단위 이하 첫째자리에서 반올림합니다. ② 요금 등의 청구금액(부가세 포함)에 10 원 미만의 끝수가 있을 때에는 국고금관리법에서 정한 바에 따라 그 끝수는 계산하지 않습니다. 구 분 계 산 단 위사 용 설 비변 압 기 설 비계 약 전 력요 금 적 용 전 력최 대 수 요 전 력사 용 전 력 량무 효 전 력 량역 률전 기 계 기 의 오 차 율 1W1VA1kW1kW1kW1kWh1kVarh1%0. 1% 전기사용계약의 체결·변경 및 해지", "keywords": ["제7조", "끝수 계산", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제8조", "title": "전기사용신청", "page": 15, "text": "① 고객이 전기사용을 새로 신청하거나 변경하고자 할 경우(이하 \"전기사용신청\"이라 합니다)에는 미리 이 약관을 승낙하여야 합니다. ② 고객은 한전이 정한 신청서(세칙 별지 1 호 서식)에 필요한 사항을 기재하여 전기사용자 명의로 전기사용신청을 하여야 합니다. 이 경우 고객은 한전을 방문하거나 우편, 팩시밀리, 인터넷 등을 이용하여 신청할 수 있습니다. 다만, 세칙에서 별도로 정하는 경우에는 전화 또는 구두로 신청할 수 있습니다. ③ 전기사용장소의 소유자가 아닌 고객이 전기사용을 신청하거나 변경하고자 할 경우에는 해당 소유자의 동의를 받아야 합니다. 다만, 세칙에서 별도로 정한 경우에는 소유자의 동의를 생략할 수 있습니다.", "keywords": ["제8조", "전기사용신청", "기본공급약관(260401)", "신청", "접수", "계약", "approval"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제9조", "title": "전기사용신청의 승낙, 거부 및 반려", "page": 15, "text": "① 고객이 전기사용신청을 하는 경우에는 한전은 공급을 승낙합니다. ② 제 1 항에도 불구하고 다음 각 호의 하나에 해당하는 경우에 한전은 전기공급의 일부 또는 전부를 거부할 수 있습니다.1. 법령에 따라 전기공급을 제한할 경우 2. 산업통상자원부장관의 명령이 있을 경우 3. 전력수급 상황에 따라 공급능력이 없는 경우 4. 전기공급설비의 상황에 따라 부득이한 경우 5. 이 약관 이외의 조건으로 전기사용신청이 있을 경우. 다만, 산업통상자원부장관의 인가를 받은 경우는 제외합니다.6. 제 15 조(고객의 책임으로 인한 전기사용계약의 해지)에 따라 전기요금 미납으로 해지된 고객이 미납요금을 납부하지 않고 같은 장소나 다른 장소에서 전기사용 또는 그 변경을 신청하는 경우 7. 고객이 불합리한 조건을 제시하거나 한전의 정당한 조건에 의하지 아니하고 다른 방법으로 전기 공급을 요청하는 경우 8. 재해 등 그 밖의 비상사태로 전기공급이 불가능한 경우 ③ 한전은 제 2 항 제 3 호, 제 4 호에 따라 공급을 거부할 경우에는 산업통상자원부장관의 승인을 받아 시행합니다. ④ 제 1 항에도 불구하고 다음 각호의 하나에 해당하는 경우 한전은 고객의 전기사용신청을 거부하거나 반려할 수 있습니다. 1. 전기사업법 시행령 제 5 조의 5 제 5 호의 2 에 따라 전기의 품질 또는 전력계통의 신뢰도를 유지할 수 없는 경우 2. 전기사업법 시행령 제 5 조의 5 제 5 호에 해당하는 고객으로서 한전이 전기사용계약서를 발송한 날로부터 1 년이 되는 날까지 전기사용계약을 체결하지 않는 경우 3. 고객이 시설부담금을 청구일로부터 1 개월이 되는 날까지 납부하지 않는 경우", "keywords": ["제9조", "전기사용신청의 승낙, 거부 및 반려", "기본공급약관(260401)", "신청", "접수", "계약", "approval"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제10조", "title": "전기사용계약의 성립 및 전기사용계약기간", "page": 16, "text": "① 고객과 한전간의 전기사용계약 및 변경계약은 다음에서 정한 날에 성립합니다.1. 전기사용계약서(세칙 별지 2 호 서식)를 작성하는 고객은 전기사용계약 체결일 2. 제 1 호 이외의 고객은 시설부담금 청구서 발송일(인터넷청구일 포함). 다만, 시설부담금이 없는 고객은 전기사용신청 접수일로 합니다. ② 제 1 항 제 1 호의 전기사용계약서 작성시기와 작성대상은 세칙으로 정합니다. ③ 전기사용계약기간은 전기사용계약이 성립되거나 변경된 날로부터 제 66 조(요금의 적용 개시시기)에서 정한 수급개시일 이후의 1 년이 되는 날까지로 합니다. 다만, 임시전력은 전기사용계약시 정한 기간으로 합니다. ④ 전기사용계약기간 만료 이전에 전기사용계약의 해지나 변경이 없을 경우 전기사용계약은 계약기간 만료후에도 1 년마다 동일한 조건으로 계속되는 것으로 합니다.", "keywords": ["제10조", "전기사용계약의 성립 및 전기사용계약기간", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제11조", "title": "전기사용계약의 변경", "page": 16, "text": "① 전기사용계약기간중에 전기사용계약의 변경이 필요할 경우에는 고객과 한전이 협의하여 변경할 수 있습니다. ② 고객의 전기사용상태가 한전과 체결한 전기사용계약과 다를 경우 한전은 고객에게 신속히 적정한 계약으로 변경할 것을 요청할 수 있으며, 해당 고객은 이에 협조하여야 합니다.", "keywords": ["제11조", "전기사용계약의 변경", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제12조", "title": "전기사용계약자의 변경", "page": 16, "text": "① 전기사용자가 변경되는 경우 새로운 고객과 이전 고객은 이를 14 일 이내에 한전에 알리고, 새로운 고객은 전기사용계약자 변경 신청을 하여야 합니다. ② 상속, 합병 등 포괄승계를 원인으로 전기사용자가 변경되는 경우 새로운 고객은 전기사용계약자를 변경하여 전기를 계속 사용할 수 있으며, 새로운 고객은 한전에 대한 이전 고객의 모든 권리의무를 승계합니다. ③ 매매 등으로 전기사용자가 변경되는 경우 새로운 고객은 전기사용계약자 변경에 따른 사용자별 요금 구분청구를 신청할 수 있으며, 한전은 전기사용자 변경일을 기준으로 새로운 고객과 이전 고객의 전기요금을 각각 계산하여 청구할 수 있습니다. 다만 새로운 고객이 전기사용자 변경일 이후에 사용자별 요금 구분청구를 신청할 경우, 한전은 미납요금에 한하여 변경일이 속한 해당월의 사용전력량을 고객과 협의하여 결정하고 이에 따라 요금을 각각 계산하여 청구합니다. ④ 위의 전기사용계약자 변경 신청은 문서로 하는 것을 원칙으로 합니다.", "keywords": ["제12조", "전기사용계약자의 변경", "기본공급약관(260401)", "명의변경", "계약자변경"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제13조", "title": "고객의 요청에 따른 전기사용계약의 해지", "page": 17, "text": "① 고객이 전기사용계약을 해지하고자 할 때는 해지희망일을 정해 1 일전까지 한전에 알려야 하며, 한전은 원칙적으로 해지희망일에 공급을 끝내기 위한 조치를 합니다. 다만, 고객의 책임으로 해지희망일에 공급을 끝내기 위한 조치를 하지 못할 경우에는 그 조치를 완료한 날에 전기사용계약이 해지됩니다. ② 전기사용장소의 소유자는 임차인 등 실제 전기사용자의 동의를 얻어야 전기사용계약을 해지할 수 있습니다. 이 때 실제 전기사용자가 계속하여 전기를 사용하고자 할 경우에는 제 79 조(요금의 보증)에 따라 전기요금에 대한 보증조치를 하여야 합니다. ③ 이사, 설비변동 등으로 전기사용계약의 해지 사유가 명확할 경우 제 8 조 제 3 항에도 불구하고 전기사용자는 소유자의 동의 없이 전기사용계약의 해지를 신청할 수 있습니다.", "keywords": ["제13조", "고객의 요청에 따른 전기사용계약의 해지", "기본공급약관(260401)", "해지", "종료", "termination"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제14조", "title": "고객의 요청에 따른 계약전력의 감소", "page": 17, "text": "고객의 요청에 따라 계약전력 일부를 감소시킬 경우에는 제 13 조(고객의 요청에 따른 전기사용계약의 해지)에 준하여 처리합니다.", "keywords": ["제14조", "고객의 요청에 따른 계약전력의 감소", "기본공급약관(260401)", "계약전력", "kW", "수요전력"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제15조", "title": "고객의 책임으로 인한 전기사용계약의 해지", "page": 17, "text": "다음 각호의 하나에 해당하는 경우 한전은 전기사용계약을 해지할 수 있습니다.1. 고객이 납기일부터 2 개월이 되는 날까지 요금을 납부하지 않을 경우. 이 경우 한전은 해지예정일 7 일전까지 고객에게 해지를 예고하고 요금납부의무 이행을 촉구합니다. 다만, 주거용인 주택용전력 고객에 대하여는 해지를 하지 않고 전류제한기를 설치하여 제한적으로 전기를 공급할 수 있습니다.2. 제 45 조(고객의 책임으로 인한 공급의 정지)에 따라 전기공급이 정지된 고객이 정지일부터 10 일 이내에 그 사유를 해소하지 않을 경우 3. 전기공급 대상 목적물이 없어졌거나, 실제 전기사용자가 없어 전기를 사용하지 않고 있는 것이 분명할 경우 4. 주택용전력 이외의 고객으로서 부도 등으로 전기요금 납부가 불가능한 경우 5. 고객과 한전이 협의하여 결정한 수급개시일로부터 6 개월이 되는 날까지 고객측 사유로 수급을 개시하지 않는 경우. 단, 세칙으로 정하는 경우에는 전기사용계약의 해지를 보류할 수 있습니다.", "keywords": ["제15조", "고객의 책임으로 인한 전기사용계약의 해지", "기본공급약관(260401)", "해지", "종료", "termination"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제16조", "title": "전기사용계약 해지후 재사용시의 고객부담", "page": 18, "text": "① 제 13 조(고객의 요청에 따른 전기사용계약의 해지), 제 14 조(고객의 요청에 따른 계약전력의 감소), 제 15 조(고객의 책임으로 인한 전기사용계약의 해지)에 따라 전기사용계약을 해지하거나 계약전력의 일부를 감소시킨 고객이 그 사유를 해소한 후 해지 또는 계약전력의 일부감소 이전과 동일한 전기사용장소에서 동일한 공급조건으로 전기를 재사용하는 경우 고객은 다음 각 호에서 정한 비용을 부담합니다.1. 해지기간 중 기본요금가. 해지이전과 동일한 고객이 해지후 1 년 이내에 전기를 재사용하는 때에는 해지기간중의 기본요금을 부담하여야 하지만 한전은 해지기간 중의 기본요금 청구를 보류합니다. 다만, 위의 고객이 재사용일로부터 1 년 이내에 해지하고 그 해지일로부터 1 년 이내에 다시 재사용하는 경우에는 청구를 보류한 기본요금을 포함하여 해지기간중의 기본요금을 부담합니다. 이때 제 68 조(요금적용전력의 결정) 제 2 항에 해당하는 고객은 해지기간 중 기본요금의 50%를 부담합니다. 나. “가”에도 불구하고 15 조(고객의 책임으로 인한 전기사용계약의 해지)에 따른 고객은 해지기간 중 기본요금을 부담하지 않습니다.2. 재사용수수료해지후 3 년 이내에 전기를 재사용하는 고객은 재사용고객과 해지이전 고객의 동일여부와 관계없이 제 46 조(전기사용계약 해지 또는 공급정지 후 재사용 및 재사용수수료) 제 2 항에서 정한 재사용수수료를 부담합니다.3. 시설부담금가. 전기사용계약이 해지된 장소에서 3 년 이내에 재사용하는 경우에는 재사용고객과 해지이전 고객의 동일여부에 관계없이 시설부담금을 부담하지 않습니다. 나. 해지후 3 년 경과 후에 재사용하는 경우에는 재사용고객과 해지이전 고객의 동일여부에 관계없이 재사용수수료와 설계시설부담금을 합산한 금액과 새로이 전기를 사용하는 것으로 보고 산정한 시설부담금 중 적은금액을 부담합니다. 다만, 해지 후 10 년 경과시에는 새로이 전기를 사용하는 것으로 보고 산정한 시설부담금을 부담합니다.4. <삭 제, 2014. 6. 1>② 제 13 조(고객의 요청에 따른 전기사용계약의 해지), 제 14 조(고객의 요청에 따른 계약전력의 감소), 제 15 조(고객의 책임으로 인한 전기사용계약의 해지)에 따라 전기사용계약을 해지한 후 3 년 이내에 재사용할 때의 공급조건이 해지당시와 다른 경우에는 재사용 고객과 해지이전 고객의 동일여부에 관계없이 제 89 조(공급설비의 변경에 따른 시설부담금)에 따라 산정한 시설부담금을 추가로 부담합니다.", "keywords": ["제16조", "전기사용계약 해지후 재사용시의 고객부담", "기본공급약관(260401)", "해지", "종료", "termination"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제17조", "title": "전기사용계약 해지후의 채권·채무", "page": 19, "text": "요금 및 기타 채권·채무는 전기사용계약이 해지된 이후에도 소멸하지 않습니다. 전기사용계약의 기준", "keywords": ["제17조", "전기사용계약 해지후의 채권·채무", "기본공급약관(260401)", "해지", "종료", "termination"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제18조", "title": "전기사용장소", "page": 21, "text": "①전기사용장소란 원칙적으로 토지·건물 등을 소유자나 사용자별로 구분하여 전기를 공급하는 장소를 말하며, 1 구내를 이루는 것은 1 구내를, 1 건물을 이루는 것은 1 건물을 1 전기사용장소로 합니다. ②2 이상의 건물이 1 구내를 형성하고 건물별로 소유자가 다를 경우에는 소유자별로 구분된 건물을 1 전기사용장소로 할 수 있습니다. ③매매·상속 등 법률적 원인으로 전기사용장소의 변경사유가 발생하는 경우에도 고객이 희망할 경우에는 기존의 전기사용장소를 계속 유지할 수 있습니다. ④상가부분과 주거부분이 구분되는 상가부 공동주택은 상가부분과 주거부분을 각각 별도의 전기사용장소로 할 수 있습니다.", "keywords": ["제18조", "전기사용장소", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제18조의2", "title": "전기사용계약단위", "page": 21, "text": "한전은 1 전기사용장소에 1 전기사용계약을 체결합니다. 다만, 1 전기사용장소에 2 이상의 계약종별이 있거나, 1 전기사용장소가 세칙에서 정하는 바에 따라 2 이상의 전기사용계약단위로 구분될 경우에는 2 이상의 전기사용계약을 체결할 수 있습니다.", "keywords": ["제18조의2", "전기사용계약단위", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제18조의3", "title": "전기자동차 충전용설비에 대한 전기사용계약 기준", "page": 21, "text": "전기자동차 충전용설비에 대한 전기사용장소 획정, 전기사용계약단위 구분 등 전기사용계약기준은 세칙에서 정하는 바에 따릅니다.", "keywords": ["제18조의3", "전기자동차 충전용설비에 대한 전기사용계약 기준", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제19조", "title": "계약전력 결정 기준", "page": 21, "text": "① 계약전력은 제 20 조(계약전력 산정) 제 1 항과 제 2 항에 따라 산정한 것 중 고객이 신청한 것을 기준으로 결정합니다. ② 고압 이상으로 전기를 공급받는 고객이 사용설비를 기준으로 계약전력 산정을 희망하는 경우에는 사용설비 내역서를 한전에 제출해야 합니다. ③ 순수 주거용으로 전기사용을 신청하는 경우에는 제 1 항과 달리 계약전력을 결정할 수 있습니다.", "keywords": ["제19조", "계약전력 결정 기준", "기본공급약관(260401)", "계약전력", "kW", "수요전력"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제20조", "title": "계약전력 산정", "page": 22, "text": "① 사용설비에 의한 계약전력은 다음과 같이 산정합니다. 1. 사용설비 개별 입력의 합계에 다음 표의 계약전력 환산율을 곱한 것으로 합니다. 이때 사용설비 용량이 입력과 출력으로 함께 표시된 경우에는 표시된 입력을 적용하고, 출력만 표시된 경우에는 세칙에서 정하는 바에 따라 입력으로 환산하여 적용합니다. 구 분 계약전력환 산 율 비 고처음 75kW에 대하여 100%계산의 합계 끝수가 1kW 미만일 경우에는 소수점 이하 첫째자리에서 반올림합니다. 다음 75kW에 대하여 85%다음 75kW에 대하여 75%다음 75kW에 대하여 65%300kW 초과분에 대하여 60%2. 사용설비 1 개의 입력이 75㎾를 초과하는 것이 있을 경우에는 초과 사용설비의 개별 입력이 제일 큰 것부터 하나씩 계약전력 환산율을 100%부터 60%까지 차례로 적용하고, 나머지 사용설비의 입력합계에는 하나씩 적용한 계약전력 환산율이 끝나는 다음 계약전력 환산율부터 차례로 적용합니다. 3. 위 제 1 호, 제 2 호에도 불구하고 모든 사용설비가 동시에 사용될 가능성이 있는 경우에는 환산율을 적용하지 않을 수 있으며, 세부기준은 세칙에서 정하는 바에 따릅니다. ② 변압기설비에 의한 계약전력은 한전에서 전기를 공급받는 1 차변압기 표시용량의 합계(1kVA를 1kW로 봅니다)로 하는 것을 원칙으로 합니다. 다만, 154kV이상으로 수전하는 고객은 최대수요전력을 기준으로 고객과 협의하여 결정할 수 있습니다. 전기의 공급방법 및 공사", "keywords": ["제20조", "계약전력 산정", "기본공급약관(260401)", "계약전력", "kW", "수요전력"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제21조", "title": "공급", "page": 25, "text": "① 한전은 고객의 전기사용신청이 있을 경우 고객과 협의하여 수급개시일을 정하고 공급을 위한 조치를 완료한 후 지체없이 전기를 공급합니다. 다만, 고객이 다음 중의 하나에 해당하는 경우에는 그 이행 또는 시정 후에 전기를 공급합니다.1. 시설부담금 및 변상금을 납부하지 않은 경우 2. 요금, 위약금 및 보증금 등을 납부하지 않은 경우 3. 일반용전기설비 고객으로서 법령이 정한 바에 따른 점검결과가 기술기준에 적합하지 않은 경우 4. 자가용전기설비 고객으로서 사용전 검사를 받지 않거나 전기안전관리담당자를 선임하지 않은 경우 ② 한전은 기상여건·용지사정·전기공급설비 상황 등 부득이한 사유로 미리 정한 수급개시일에 전기를 공급하지 못하게 될 경우에는 그 이유를 통지하고 고객과 협의하여 다시 수급개시일을 정해 전기를 공급합니다.", "keywords": ["제21조", "공급", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제22조", "title": "공급방법", "page": 25, "text": "한전은 1 전기사용계약에 대하여 1 공급방식, 1 공급전압 및 1 인입으로 전기를 공급합니다. 다만, 부득이한 경우에는 인입방법을 달리할 수 있습니다.", "keywords": ["제22조", "공급방법", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제23조", "title": "전기공급방식, 공급전압 및 주파수", "page": 25, "text": "① 고객이 새로 전기를 사용하거나 계약전력을 증가시킬 경우의 공급방식 및 공급전압은 1 전기사용장소내의 계약전력 합계를 기준으로 다음 표에 따라 결정하되, 특별한 사정이 있는 경우에는 달리 적용할 수 있습니다. 다만, 고객이 희망할 경우에는 아래 기준보다 상위전압으로 공급할 수 있습니다. 계약전력공급방식 및 공급전압 1,000kW 미만교류 단상 220V 또는 교류 삼상 380V중 한전이 적당하다고 결정한 한 가지 공급방식 및 공급전압 1,00010,000kW 이상kW 이하교류 삼상 22,900V10,000400,000kW 초과kW 이하교류 삼상 154,000V400,000kW 초과교류 삼상 345,000V 이상 전기의공급방법 및공사 ② 제 1 항에 따라 1,000kW 미만까지 저압으로 공급시에는 1 전기사용계약단위의 계약전력이 500kW미만이어야 하며, 공급기준은 세칙에서 정하는 바에 따릅니다. ③ 제 1 항에도 불구하고 다음 각 호의 어느 하나에 해당하는 경우에는 공급전압을 달리 적용할 수 있으며, 세부기준은 세칙에서 정하는 바에 따릅니다. 1. 신설 또는 증설 후의 계약전력이 40,000kW 이하인 고객이 22,900V로 공급을 희망할 경우 한전변전소의 공급능력에 여유가 있고 전력계통의 보호협조, 선로구성 및 계량방법에 문제가 없으면 한전은 22,900V로 공급할 수 있습니다. 2. 신설 또는 증설 후의 계약전력이 400,000kW를 초과하는 고객이 154,000V로 공급을 희망할 경우 전력계통의 공급능력에 여유가 있고 전력계통의 보호협조, 선로구성 및 계량방법에 문제가 없으면 한전은 154,000V로 공급할 수 있습니다.3. 제 1 항에 따라 고압 이상의 전압으로 공급받아야 하는 아파트고객이 저압공급을 희망하고 개폐기·변압기 등 한전의 공급설비 설치장소를 무상으로 제공할 경우에는 한전은 저압으로 공급할 수 있습니다.4. 해당지역의 전기공급상황에 따라 변전소 건설이 필요한 지역에서 고객이 변전소 건설장소를 제공할 경우에는 제 1 항에도 불구하고 한전은 고객이 희망하는 특별고압 중 1 전압으로 공급할 수 있습니다. ④ 한전이 고객에게 전기를 공급하는 경우의 표준전압별 전압유지범위는 아래와 같으며, 주파수는 60 헤르츠(Hz)를 표준주파수로 합니다.", "keywords": ["제23조", "전기공급방식, 공급전압 및 주파수", "기본공급약관(260401)", "전압", "주파수", "supply voltage"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제24조", "title": "한전공급설비 설치공간 확보, 제공", "page": 26, "text": "① 건축법시행령 제 87 조(건축설비 설치의 원칙) 제 6 항에 따라 연면적이 500 제곱미터 이상인 건축물의 대지에는 국토교통부령(건축물의 설비기준 등에 관한 규칙) 및 세칙에서 정하는 바에 따라 한전이 전기를 배전(配電)하는데 필요한 전기설비를 설치할 수 있는 공간을 확보, 제공하여야 합니다. ② 고압 이상의 전기를 지중으로 공급받는 고객은 한전의 공급설비 설치장소를 제공해야 합니다. ③ 아파트 등 공동주택 고객은 기술적 또는 기타 사유로 부득이한 경우 전기사용장소 내에 한전의 공급설비 설치장소를 제공해야 합니다. 표준전압유지범위 110V110V ± 6V 이내 220V220V ± 13V 이내 380V380V ± 38V 이내 ④ 제 1 항부터 제 3 항까지의 경우 한전의 공급설비 설치장소는 고객과 협의하여 결정합니다.", "keywords": ["제24조", "한전공급설비 설치공간 확보, 제공", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제25조", "title": "고객 변압기설비 공동이용", "page": 27, "text": "①2 이상의 고객이 다음 각호를 모두 충족할 경우에는 세칙에서 정하는 바에 따라 한전으로부터 전기를 공급받는 변압기설비를 공동으로 이용(이하 “공용”이라 합니다) 할 수 있으며, 그 전부나 각각에 대하여 전기사용계약을 체결할 수 있습니다. 다만, 고객이 자가발전설비로 상시 전력을 충당할 경우에는 각 고객별로 전기사용계약을 체결합니다. 1. 각 고객의 전기사용장소가 서로 가깝게 붙어 있고, 그 사이에 제 3 자가 전기사용장소를 설정할 수 없거나 동일 전기사용장소 내에서 전기사용계약단위를 분리하여 전기를 공급받을 경우 2. 변압기설비를 공용하는 것이 경제적, 기술적으로 타당한 경우 3. 설비의 공용범위, 요금체납 해지시 대표고객 및 공동이용고객에 대한 해지시공방법, 전기사업법상의 책임한계 등 공용으로 인해 예상되는 사항에 대한 책임 및 처리방법을 고객간에 명확히 정하는 경우 ② 한전과 공동이용고객 사이의 전기안전 책임한계점은 대표고객의 수급지점으로 하며, 전기안전 책임은 대표고객에게 있습니다. 제 26 조 <삭 제, 2010. 11. 1>", "keywords": ["제25조", "고객 변압기설비 공동이용", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제27조", "title": "수급지점", "page": 27, "text": "① 고객이 한전으로부터 전기를 받는 지점(이하 “수급지점”이라 합니다)은 한전의 전선로 또는 인입선과 고객 전기설비와의 연결점으로 합니다. ② 수급지점은 세칙에서 정하는 전기사용장소내의 한 지점으로 하되, 한전 전선로에서 가장 가까운 거리에 있는 지점을 기준으로 고객과 한전이 협의하여 결정합니다. 다만, 다음 중의 하나에 해당할 경우에는 고객과 한전이 협의하여 전기사용장소 이외의 지점을 수급지점으로 할 수 있습니다. 1. 1 건물내 2 이상의 전기사용계약단위에 전기를 공급하는 경우로서 각 전기사용계약단위까지의 전기설비가 한전이 관리하기 곤란한 장소를 통과할 경우 2. 제 25 조(고객 변압기설비 공동이용)에 따라 전기를 공급할 경우 3. 제 30 조(공중인입선) 제 2 항에 따라 전기를 공급할 경우 4. 제 31 조(지중인입선) 제 4 항에 따라 전기를 공급할 경우 전기의공급방법 및공사 5. 제 36 조(전용공급설비)에 따라 전기를 공급할 경우 6. 제 86 조(임시공급설비의 시설부담금) 제 2 항에 따라 전기를 공급할 경우 7. 22,900V를 초과하는 전압으로 전기를 공급할 경우 8. 기타 특별한 사정으로 부득이한 경우", "keywords": ["제27조", "수급지점", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제28조", "title": "공급설비의 시설", "page": 28, "text": "① 한전이 시설하는 전선로는 공중전선로로 합니다. 다만, 다음 중의 하나에 해당할 경우에는 지중전선로로 시설합니다. 1. 한전의 전선로 지중화계획에 따라 지중화지역으로 선정, 공고된 지역 및 지중화 지역으로 선정, 공고된 지역의 인접지역 2. 지중배전선로가 이미 설치되어 지중으로 공급하고 있는 지역 3. 기술적 및 기타 부득이한 사유가 있는 경우 4. 고객이 지중전선로를 희망하고 한전이 이를 타당하다고 인정하는 경우 ② 한전의 공급설비부터 수급지점까지의 설비는 한전이 시설·소유합니다. 이 때 고객은", "keywords": ["제28조", "공급설비의 시설", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제29조", "title": "고객소유의 전기설비 인수", "page": 28, "text": "한전은 고객의 요청이 있고 필요하다고 인정하는 경우에는 고객 소유의 전기설비를 인수할 수 있습니다.", "keywords": ["제29조", "고객소유의 전기설비 인수", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제30조", "title": "공중인입선(空中引入線", "page": 28, "text": ")① 한전의 전선로와 고객의 전기설비를 인입선으로 연결할 경우에는 공중으로 하는 것을 원칙으로 하며, 한전이 인입선 연결점의 애자(완철을 포함합니다)까지 시설합니다. 이 때 “인입선 연결점”은 한전 전선로의 가장 적합한 전주에서 전기사용장소내의 가장 가까운 건조물이나 보조지지물(고객의 구내전주 등)을 기준으로 고객과 한전이 협의하여 결정합니다. ② 고압 이상의 전압으로 전기를 공급받는 고객은 제 1 항에도 불구하고 공중인입선을 고객이 시설·소유합니다. 이 때 한전은 원칙적으로 공중전선로의 가장 적합한 전주에 있는 고객 전선로와의 연결점(고객 인입용애자를 포함합니다)까지 시설합니다. ③ 인입선 연결을 위해 전기사용장소내에 구내전주 등 보조지지물을 시설하거나 고객의 희망에 따라 한전 규격품 이외의 완철 등 인입지지물을 시설할 경우에는 고객이 그 지지물을 시설합니다.", "keywords": ["제30조", "공중인입선(空中引入線", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제31조", "title": "지중인입선(地中引入線", "page": 29, "text": ")①한전의 지중전선로와 고객의 전기설비를 연결하거나 지중화 지역으로 선정 공고된 지역의 공중전선로와 고객의 전기설비를 연결할 경우에는 지중인입선으로 연결하며지중인입선 연결점까지 한전이 시설합니다. 이 때 “지중인입선 연결점”은 전기사용장소내에 한전이 시설하는 개폐기의 고객측 연결점이나 인입선 연결점에 상당하는 부분으로 합니다. ②제 1 항의 개폐기나 인입선 연결점에 상당하는 부분의 시설장소는 한전 전선로의 가장 적당한 분기점이나 전주로부터 가장 가까운 거리에 있고 안전하게 시설할 수 있는 장소를 기준으로 고객과 한전이 협의하여 결정합니다. 다만, 위의 범위를 벗어나는 경우 전기사용장소내의 지중인입선은 고객이 시설·소유합니다. ③ 지중인입선을 설치하기 위하여 전기사용장소내에 시설하는 구조물(맨홀·관로·케이블인입구 등)은 고객이 시설·소유합니다. 다만, 한전이 필요하다고 인정할 경우에는 한전에서 시설·소유할 수 있습니다. ④ 제 1 항에 따라 지중인입선으로 연결해야 하는 지역 이외의 지역에서 고객이 희망하여 지중인입선으로 연결할 경우에는 제 1 항에도 불구하고 고객이 지중인입선을 시설·소유합니다.", "keywords": ["제31조", "지중인입선(地中引入線", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제32조", "title": "연접인입선(連接引入線", "page": 29, "text": "및 공동인입선(共同引入線))① 한전은 건물 밀집장소 등 특별한 사정이 있는 장소에서는 연접인입선이나 공동인입선으로 전기를 공급할 수 있습니다. 특히, 공동주택 등과 같이 1 건물내 2 이상의 고객에게 전기를 공급할 경우에는 원칙적으로 공동인입선으로 공급합니다. ② 한전은 다른 고객의 전기공급을 위해 필요할 경우 고객의 승낙을 받아 고객의 구내전주·인입선·인입구배선 등을 공용할 수 있습니다.", "keywords": ["제32조", "연접인입선(連接引入線", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제33조", "title": "인입구배선(引入口配線", "page": 29, "text": ")① 인입선 연결점부터 전기사용장소내의 고객 소유 인입개폐기에 이르는 배선(이를 “인입구배선”이라 합니다)은 고객이 시설·소유합니다. ② 저압용 인입구배선은 케이블선이나 금속관 배선 또는 합성수지관 배선으로 노출 시설해야 합니다. 다만, 부득이한 경우에는 고객과 한전이 협의하여 노출 시설하지 않을 수 있습니다. 전기의공급방법 및공사", "keywords": ["제33조", "인입구배선(引入口配線", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제34조", "title": "인입선의 연결", "page": 30, "text": "한전의 전선로나 인입선과 고객의 전기설비와의 연결은 한전이 시공합니다. 다만, 한전에서 필요하다고 인정할 경우에는 한전이 지정한 자에게 위탁하여 시공할 수 있습니다.", "keywords": ["제34조", "인입선의 연결", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제35조", "title": "인입선 등의 위치변경", "page": 30, "text": "① 한전이 필요하다고 인정할 경우에는 인입선이나 전기계기의 설치장소를 변경할 수 있습니다. 이 때 인입구배선의 변경이 필요할 경우에는 한전이 소요비용을 부담하여시공합니다. ② 고객의 희망에 따라 인입선이나 전기계기 등의 설치장소를 변경할 경우에는 고객이 소요비용을 부담합니다.", "keywords": ["제35조", "인입선 등의 위치변경", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제36조", "title": "전용공급설비", "page": 30, "text": "다음 중의 하나에 해당할 경우에는 특정 고객에게만 공급하기 위한 설비(이하 “전용공급설비”라 합니다)를 시설하여 공급할 수 있습니다. 다만, 2 이상의 고객이 서로 합의하여 전용공급설비로 사용하고자 할 경우에는 2 이상의 고객이 전용할 수 있습니다. 1. 제 39 조(전기사용에 따른 보호장치 등의 시설) 제 1 항에 따른 경우 2. 고객이 희망하고 다른 고객에 대한 전기공급에 지장이 없다고 한전이 인정하는 경우", "keywords": ["제36조", "전용공급설비", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제37조", "title": "전력량계 등의 설치 및 소유", "page": 30, "text": "① 제 18 조의 2(전기사용계약단위)에 따라 한전과 전기사용계약을 체결한 고객의 요금계산에 필요한 전력량계와 동 부속장치(타임스위치, 시험용단자대, 계기용변류기 등)는 한전이 시설·소유합니다. 다만, 고압 이상의 전압으로 전기를 공급받는 고객의 부속장치(계기용변성기, 계기용변류기 등)와 합성계량장치는 고객이 시설·소유합니다. ②전력량계와 동 부속장치의 시설에 필요한 배선설비[전력량계함(부속장치 포함)·변성기함·변성기 배선·배선용 금속관·접지시설·가대(架臺)·부설판 등] 및 고객 구내의 통신설비는 고객이 시설·소유합니다. 다만, 옥외에 시설하는 저압 단독 전력량계함은 한전이 시설·소유합니다. ③ 한전은 고객으로부터 전력량계 및 동 부속장치의 설치장소를 제공받습니다. 이 때 전력량계의 설치위치는 계량이 적정하게 되고 검침 및 검사를 안전하고 쉽게 받을 수 있는 장소로 하며, 고객과 한전이 협의하여 결정합니다. 특히, 저압으로 전기를 공급받는 고객의 전력량계와 동 부속장치는 옥외에 설치함을 원칙으로 합니다. ④ 전력량계 및 동 부속장치의 재검정, 시험 및 수리는 소유자가 시행합니다. ⑤고객은 전력량계의 이상 여부 등에 대한 성능시험을 한전 또는 외부 전문기관에 요청할 수 있으며, 검사결과 계량기의 오차가 「계량에 관한 법률」에서 정한 사용공차 범위 이내일 경우에는 세칙에서 정하는 바에 따라 전력량계 성능검사 수수료를 고객이 부담합니다.", "keywords": ["제37조", "전력량계 등의 설치 및 소유", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제38조", "title": "전력량계 등의 설치기준", "page": 31, "text": "①한전은 1 전기사용계약에 대하여 1 전력량계를 설치합니다. 다만, 부득이한 경우에는 전력량계 설치기준을 달리할 수 있습니다. ②한전은 고압이상의 전압으로 전기를 공급받는 고객에게는 최대수요전력과 무효전력을 계량할 수 있는 전력량계를 설치하며, 일반용전력(갑)Ⅱ, 산업용전력(갑)Ⅱ, 일반용전력(을), 교육용전력(을), 산업용전력(을)의 요금을 적용받는 고객에게는 사용량을 시간대별로 구분하여 계량할 수 있는 전력량계를 설치합니다. ③한전은 교육용 저압고객, 대표고객의 변압기 설비를 공동이용하는 고객 중 저압 계량하는 고객, 고압 이상의 전압으로 공급받아야 하는 아파트 중 고객희망으로 저압으로 공급하는 고객(공동설비만 해당)에게는 최대수요전력을 계량할 수 있는 전력량계를 설치할 수 있습니다. ④ 한전은 저압으로 전기를 공급받는 고객 중 전기사용의 특성 및 용도 등을 고려하여 세칙에서 정한 고객에게는 최대수요전력과 무효전력을 계량할 수 있는 전력량계를 설치할 수 있습니다. 전기사용에 따른 협력", "keywords": ["제38조", "전력량계 등의 설치기준", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제39조", "title": "전기사용에 따른 보호장치 등의 시설", "page": 33, "text": "① 고객이 다음 중 하나의 원인으로 다른 고객의 전기사용을 방해하거나 방해할 우려가 있을 경우 또는 한전의 전기설비에 지장을 미치거나 미칠 우려가 있을 경우에는 고객의 부담으로 한전이 인정하는 조정장치나 보호장치를 전기사용장소에 시설해야 하며, 특히 필요할 경우에는 공급설비를 변경하거나 전용공급설비를 설치한 후 전기를 사용해야 합니다.1. 각 상간(各 相間)의 부하가 현저하게 평형을 잃을 경우 2. 전압이나 주파수가 현저하게 변동할 경우 3. 파형(波形)에 현저한 왜곡(歪曲)이 발생할 경우 4. 현저한 고조파(高調波)를 발생할 경우 5. 기타 위에 준하는 경우 ② 부득이한 사유로 전기공급이 중지되거나 결상될 경우 경제적 손실이 발생될 우려가 있는 고객은 비상용 자가발전기, 무정전전원공급장치(UPS), 결상보호장치, 정전경보장치 등 적절한 자체보호장치를 시설하여 피해가 발생하지 않도록 주의해야 합니다.", "keywords": ["제39조", "전기사용에 따른 보호장치 등의 시설", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제40조", "title": "전기사용장소의 출입", "page": 33, "text": "한전은 다음 중의 하나에 해당할 경우 고객의 승낙을 받고 신분증을 제시한 후 고객의 토지 및 건물에 출입할 수 있습니다. 이 때 고객은 정당한 사유가 없다면 출입을 승낙해야 합니다.1. 한전 공급설비의 설계·시공·개수·순시·점검 및 이와 관련된 고객안내를 할 경우 2. 제 53 조(전기안전을 위한 고객의 협력) 및 제 54 조(고객 소유의 전기설비에 대한 공사)에 따른 경우 3. 이 약관에 위반하여 전기를 사용하는 것을 방지하기 위해 고객의 전기사용 용도를 확인하거나 전기설비를 점검할 경우 4. 전력량계를 검침하거나 시험할 경우 5. 제 13 조(고객의 요청에 따른 전기사용계약의 해지), 제 15 조(고객의 책임으로 인한 전기사용계약의 해지) 또는 제 45 조(고객의 책임으로 인한 공급의 정지)에 따른 필요 조치를 할 경우", "keywords": ["제40조", "전기사용장소의 출입", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제41조", "title": "역률의 유지", "page": 34, "text": "① 고객은 전체 사용설비의 역률을 지상역률(遲相力率) 92%(이하 “기준역률”이라 합니다) 이상으로 유지해야 합니다. ② 고객은 제 1 항의 기준역률을 유지하기 위하여 적정용량의 콘덴서를 개개 사용설비별로 설치하되, 사용설비와 동시에 개폐되도록 해야 합니다. 다만, 고객의 전기사용 형태에 따라 한전이 기술적으로 타당하다고 인정할 경우에는 사용설비의 부분별로 또는 일괄하여 콘덴서를 설치할 수 있습니다. 이 때 고객은 콘덴서의 부분 또는 일괄개폐장치 등 한전이 인정하는 조정장치를 설치하여 진상역률(進相力率)이 되지 않도록 해야 합니다.", "keywords": ["제41조", "역률의 유지", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제42조", "title": "역률의 계산", "page": 34, "text": "①전기를 사용하지 않은 달의 역률과 무효전력을 계량할 수 있는 전력량계를 설치하지 않은 고객의 역률은 지상역률(遲相力率) 92%로 봅니다. ②무효전력을 계량할 수 있는 전력량계가 설치된 고객은 전력량계에 의하여 30 분 단위로 누적된 계량값으로 역률을 계산합니다. 다만, 저압으로 전기를 공급받는 고객과 원격검침이 되지 않는 고객은 전력량계에 1 개월간 누적된 계량값으로 역률을 계산합니다.", "keywords": ["제42조", "역률의 계산", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제43조", "title": "역률에 따른 요금의 추가 또는 감액", "page": 34, "text": "① 역률에 따른 요금의 추가 또는 감액 대상 고객은 제 38 조(전력량계 등의 설치기준)에 따라 무효전력을 계량할 수 있는 전력량계가 설치된 고객으로서 다음 각 호에서 정한 고객으로 합니다.1. 저압으로 전기를 공급받는 계약전력 20kW이상의 일반용전력, 산업용전력, 농사용전력, 임시전력 2. 고압이상의 전압으로 전기를 공급받는 일반용전력, 교육용전력, 산업용전력, 농사용전력, 임시전력. 단, 제 25 조(고객 변압기설비 공동이용)에 따라 대표고객의 변압기설비를 공동으로 이용하는 고객인 경우에는 계약전력 20kW 이상인 일반용전력, 교육용전력, 산업용전력, 농사용전력, 임시전력에 한합니다. ② 역률에 따른 요금의 추가 또는 감액은 다음 각 호와 같이 시간대별로 구분하여 산정합니다.1. 08 시부터 22 시까지의 역률에 따른 요금의 추가 또는 감액가. 지상역률(遲相力率)에 대하여 적용하며, 평균역률이 92%에 미달하는 경우에는 미달하는 역률 60%까지 매 1%당 기본요금의 0. 2%를 추가하고, 평균역률이 92%를 초과하는 경우에는 역률 97%까지 초과하는 매 1%당 기본요금의 0. 2%를 감액합니다. 나.“가”의 평균역률은 제 42 조(역률의 계산) 제 2 항의 본문에 따라 계산된 30 분 단위의 역률을 1 개월간 평균하여 계산합니다. 다만, 30 분 단위의 역률이 지상역률 60%에 미달하는 경우 역률 60%로, 지상역률 97%를 초과하는 경우 역률 97%로 간주하여 1 개월간 평균역률을 계산합니다. 다.“나”에도 불구하고, 제 42 조(역률의 계산) 제 2 항의 단서에 해당하는 고객의 평균역률은 전력량계에 1 개월간 누적된 계량값으로 역률을 계산합니다.2. 22 시부터 다음 날 08 시까지의 역률에 대한 요금의 추가가. 진상역률(進相力率)에 대하여 적용하며, 평균역률이 95%에 미달하는 경우에 미달하는 매 1%당 기본요금의 0. 2%를 추가합니다. 나.“가”의 평균역률은 제 42 조(역률의 계산) 제 2 항의 본문에 따라 계산된 30 분 단위의 역률을 1 개월간 평균하여 계산합니다. 다만, 30 분 단위의 역률이 진상역률 60%에 미달하는 경우에는 역률 60%로, 지상역률인 경우에는 역률 100%로 간주하여 1 개월간 평균역률을 계산합니다. 다.“나”에도 불구하고, 제 42 조(역률의 계산) 제 2 항의 단서에 해당하는 고객은 진상역률 요금을 적용하지 않습니다. ③ 해당월에 지상역률 또는 진상역률의 추가요금이 발생한 경우 첫 번째 달에는 추가요금의 청구를 예고하고 두 번째 달부터 추가요금을 청구합니다.", "keywords": ["제43조", "역률에 따른 요금의 추가 또는 감액", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제44조", "title": "위약금", "page": 35, "text": "①고객이 이 약관을 위반하여 전기를 사용함으로써 요금이 정당하게 계산되지 않았을 경우, 한전은 정당하게 계산되지 않은 금액의 3 배를 한도로 위약금을 받습니다. 다만, 직전 위약금 부과일로부터 1 년 이내에 이 약관을 다시 위반하여 전기를 사용함으로써 요금이 정당하게 계산되지 않았을 경우, 최대 5 배를 한도로 위약금을 받습니다. ②제 1 항의 정당하게 계산되지 않은 금액이란 이 약관에 정해진 공급조건에 따라 산정한 금액과 정당하지 않은 사용방법에 의해 산정된 금액과의 차액을 말합니다. ③요금이 정당하게 계산되지 않은 기간을 확인할 수 없는 경우에는 6 개월 이내에서 고객과 한전이 협의하여 결정할 수 있습니다. ④제 16 조(전기사용계약 해지 후 재사용시의 고객부담)의 규정에 의하여 해지후 재사용 고객이 해지의 원인이 된 미납요금을 납부하지 않을 목적으로 다른 고객 명의로 전기사용을 신청하거나 제 68 조(요금적용전력의 결정)의 규정에 의하여 업종변경 없이 명의만 변경하는 고객이 기본요금을 납부하지 않을 목적으로 동일고객임에도 다른 고객명의로 변경을 신청하는 경우에는 미납요금의 100%를 추가하여 위약금을 받습니다.", "keywords": ["제44조", "위약금", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제45조", "title": "고객의 책임으로 인한 공급의 정지", "page": 36, "text": "① 고객이 다음 중의 하나에 해당할 경우에는 그 고객에 대한 전기공급을 즉시 정지할 수 있습니다. 1. 고객의 책임으로 전기안전에 긴박한 위험이 발생한 경우 2. 고객이 전기사용장소내에 있는 한전의 전기설비를 고의로 손상하거나 망실하여 한전에 중대한 손해를 끼친 경우 3. 제 34 조(인입선의 연결)을 위배한 경우 4. 고객이 전기설비를 개조, 변조, 훼손 및 조작(造作)하여 부정하게 전기를 사용한 경우 ② 고객이 요금 이외의 한전에 납부해야 할 금액(제 79 조(요금의 보증)에 따른 보증금을 포함합니다)을 지정한 날까지 납부하지 않은 경우 공급정지 7 일전까지 미리 알린 후 한전은 그 고객에 대한 전기공급을 즉시 정지할 수 있습니다. ③ 고객이 다음 중의 하나에 해당하고 한전에서 그 사유의 해소를 요청해도 시정하지 않을 경우에는 그 고객에 대한 전기공급을 정지할 수 있습니다.1. 고객의 책임으로 전기안전에 위험이 있는 경우 2. 고객의 고의나 중대한 과실로 한전의 전기공급을 방해하거나 방해할 우려가 있는 경우 3. 고객이 한전과 계약한 사용설비 및 변압기설비 이외의 설비로 전기를 사용한 경우 4. 고객이 계약된 전기사용장소 또는 계약종별을 위반하여 전기를 사용한 경우 5. 제 81 조(전력사용의 휴지 등)에 따른 고객이 휴지기간에 전기를 사용한 경우 6. 고객이 제 39 조(전기사용에 따른 보호장치 등의 시설) 제 1 항에 따른 조정장치나 보호장치를 시설하지 않은 경우 7. 고객이 제 40 조(전기사용장소의 출입)에 따른 한전 직원의 출입을 정당한 이유없이 거절한 경우 8. 고객이 제 41 조(역률의 유지)에 따른 적정용량을 초과하는 콘덴서를 부설하여 진상역률이 되는 경우 9. 법령에 의하여 시·도지사 그 밖의 행정기관의 장이 전기공급의 정지를 요청하는 경우 10. 고객이 산업통상자원부장관의 전기사용의 중지 또는 제한에 따른 사항을 이행하지 않는 경우 11. 고객이 제 67 조의 3(초과사용부가금) 제 3 항에 해당하는 고객으로서 세칙 제 48 조의 2 (초과사용부가금) 제 2 항 제 1 호에 따라 7 회 이상 초과사용한 경우", "keywords": ["제45조", "고객의 책임으로 인한 공급의 정지", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제46조", "title": "전기사용계약 해지⋅휴지 또는 공급정지후 재사용 및 재사용수수료", "page": 37, "text": "① 고객이 제 13 조(고객의 요청에 따른 전기사용계약의 해지) 및 제 15 조(고객의 책임으로 인한 전기사용계약의 해지)에 따라 전기사용계약 해지후 해지사유를 해소하였거나 제 45 조(고객의 책임으로 인한 공급의 정지)에 따라 전기공급 정지후 전기사용계약이 해지되기 이전에 공급정지 사유를 해소하였을 때, 제 81 조(전력사용의 휴지 등)에 따라 전력사용 휴지후 재사용을 신청하였을 때에는 전기를 다시 공급합니다. ② 제 1 항에 따라 전기사용계약이 해지 또는 휴지되거나 전기공급이 정지된 장소에서 전기를 다시 공급받는 고객은 재사용수수료를 납부해야 합니다. 다만, 다음의 경우에는 그렇지 않습니다. 1. 전류제한기를 철거한 후 정상공급하는 주거용 주택용전력의 경우 2. 제 13 조 제 3 항에 따라 전기사용을 해지하거나 계약전력을 일부 감소시킨 고객이 아닌 다른 고객이 해지 후 1 년 이내에 동일한 전기사용장소에서 동일한 조건으로 전기를 재사용하는 경우 ③ 고압 이상의 전압으로 공급받는 고객이 고객측 사유로 전기공급의 일시 정지 및 재공급을 요청할 경우에는 세칙에서 정하는 바에 따라 인입개폐기 조작에 따른 수수료를 고객이 부담해야 합니다. 다만, 세칙에서 별도로 정한 경우에는 수수료를 면제합니다.", "keywords": ["제46조", "전기사용계약 해지⋅휴지 또는 공급정지후 재사용 및 재사용수수료", "기본공급약관(260401)", "해지", "종료", "termination"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제47조", "title": "공급의 중지 또는 사용의 제한", "page": 37, "text": "① 한전은 다음 각 호의 어느 하나에 해당할 경우에는 부득이 전기공급을 중지하거나 전기사용을 제한할 수 있습니다.1. 법령의 규정에 따라 산업통상자원부장관이 지시하는 경우 2. 전기의 수급조절로 인해 부득이한 경우 3. 한전의 전기설비에 고장이 발생하거나 발생할 우려가 있는 경우 4. 한전의 전기설비에 대한 수리, 변경 등의 공사로 인해 부득이한 경우 5. 전압 및 주파수에 심한 불균형이나 변동이 발생하거나 발생할 우려가 있는 경우 6. 비상재해 및 기타 불가항력으로 인한 경우 7. 기타 전기안전을 위하여 필요한 경우 ② 한전은 제 1 항의 경우에는 그 내용을 신문, 방송 또는 기타 방법으로 미리 고객에게 통지합니다. 다만, 긴급하거나 부득이한 경우에는 예외로 합니다.", "keywords": ["제47조", "공급의 중지 또는 사용의 제한", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제48조", "title": "중지 또는 제한에 따른 요금감액", "page": 38, "text": "① 한전은 제 47 조(공급의 중지 또는 사용의 제한)에 따라 1 개월 중 중지 또는 제한한 연시간수(延時間數) 1 시간마다 1 시간분의 기본요금을 감액합니다. 이 경우 연시간수는 1 회 연속 10 분 이상 중지 또는 제한한 시간을 합산하되, 1 시간 미만의 단수가 발생한 경우에는 30 분 이상은 절상하고 30 분 미만은 절사하여 계산합니다. 1. 공급을 중지한 경우 감액요금 = 기본요금(또는 월액요금) × 0. 2% × 중지시간수 2. 사용을 제한한 경우 ② 제 1 항의 경우에 고객의 사정으로 인한 경우에는 요금을 감액하지 않습니다.", "keywords": ["제48조", "중지 또는 제한에 따른 요금감액", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제49조", "title": "손해배상의 면책(免責", "page": 38, "text": ")한전은 다음 중의 하나에 해당하는 사유로 고객이 받은 손해에 대하여는 배상책임을 지지 않습니다.1. 제 15 조(고객의 책임으로 인한 전기사용계약의 해지)에 따라 전기사용계약을 해지한 경우 2. 제 45 조(고객의 책임으로 인한 공급정지)에 따라 전기공급을 정지한 경우 3. 제 47 조(공급의 중지 또는 사용의 제한) 제 1 항 제 1, 2, 6 호에 따라 전기 공급을 중지하거나 사용을 제한한 경우 4. 한전의 직접적인 책임이 아닌 사유로 제 47 조(공급의 중지 또는 사용의 제한) 제 1 항 제 3, 4, 5, 7 호에 따라 전기공급을 중지하거나 사용을 제한한 경우 5. 한전의 책임이 아닌 원인으로 누전 및 기타 사고가 발생한 경우", "keywords": ["제49조", "손해배상의 면책(免責", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제49조의2", "title": "한전의 직접적인 책임으로 공급중지 또는 사용제한시 손해배상", "page": 38, "text": "① 한전은 한전의 직접적인 책임으로 제 47 조(공급의 중지 또는 사용의 제한) 제 1 항 제 3, 4, 5, 7 호에 따라 전기공급을 중지 또는 사용을 제한하는 경우에는 고객이 받은 손해에 대하여 배상합니다. ② 제 1 항에도 불구하고 한전의 경과실로 제 47 조(공급의 중지 또는 사용의 제한) 제 1 항 제 3, 4, 5, 7 호에 따라 5 분 이상 전기공급을 중지하거나 사용을 제한한 경우에는 고객이 받은 손해에 대하여 아래와 같이 배상합니다. 감액요금=기본요금(또는 월액요금) ×제한전력× 0. 2%× 제한시간수요금적용전력 1. 공급중지 또는 사용제한 시간이 1 시간 이내인 경우에는 해당 시간 전기 요금 3 배를 한도액으로 합니다. 2. 공급중지 또는 사용제한 시간이 1 시간 초과 2 시간 이내인 경우에는 해당 시간 전기요금 5 배를 한도액으로 합니다. 3. 공급중지 또는 사용제한 시간이 2 시간 초과하는 경우에는 해당 시간 전기요금 10 배를 한도액으로 합니다. 4. 배상금액이 1,000 원 미만인 경우에는 1,000 원으로 하고 1 개월분 요금을 초과하는 경우 1 개월 요금으로 배상합니다. ③ 제 2 항의 배상금액 산정은 공급중지 또는 사용제한 직전 3 개월간의 청구요금을 평균하여 산정하며, 공급중지 또는 사용제한시간은 분단위로 계산(30 초 이상은 절상)합니다.", "keywords": ["제49조의2", "한전의 직접적인 책임으로 공급중지 또는 사용제한시 손해배상", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제50조", "title": "설비의 손망실에 대한 배상", "page": 39, "text": "고객이 고의 또는 과실로 전기사용장소내 한전의 전기설비·전기기기 및 기타 설비를 손상하거나 망실한 경우에는 그 설비에 대하여 다음의 금액을 배상해야 합니다. 1. 수리가 가능한 경우에는 실 수리비와 소요공사비를 합한 금액으로 하며 검정품은 검정료를 포함합니다.2. 망실 또는 수리가 불가능한 경우에는 해당 자재의 가액과 소요공사비를 합한 금액으로 하며 검정품은 검정료를 포함합니다.", "keywords": ["제50조", "설비의 손망실에 대한 배상", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제51조", "title": "업무협조", "page": 39, "text": "① 고객의 전기사용용도나 사용설비 또는 변압기설비용량 등이 변경된 경우 고객은 변경일로부터 1 개월 이내에 그 내용을 한전에 통지해야 합니다. ② 한전이 법령에 따라 고객에게 필요한 자료의 제출을 요구할 경우 고객은 정한 기일 내에 정확한 자료를 한전에 제출해야 합니다. ③ 제 2 항에 따라 한전에 제출한 자료의 내용이 변경되었을 경우 고객은 지체없이 그 내용을 통보하고 필요한 자료를 다시 제출해야 합니다. ④ 고객이 제 2 항 및 제 3 항에 따른 자료제출을 정당한 이유없이 거절 또는 지연하거나 위조, 변조 등 부실한 자료를 제출하여 한전이 가산세를 부담할 경우 고객은 그 금액을 배상해야 합니다.", "keywords": ["제51조", "업무협조", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제51조의2", "title": "고객 개인정보의 보호", "page": 39, "text": "① 한전은 전기사용신청, 전기사용계약, 시설부담금·요금의 청구 및 납부 등 전기의 공급 및 사용과 관련하여 필요한 고객 개인정보를 수집할 수 있으며 고객 개인정보의 수집은 전기공급 및 사용 등 관련 업무 수행을 위한 최소한의 범위로 합니다. ② 고객 개인정보는 고객이 직접 제출하거나 관련법령에 의하여 고객의 사전 동의를 얻은 경우에는 정부의 행정정보공동이용센터를 통해 한전이 직접 열람할 수 있습니다. ③ 한전은 관련법령에 의하여 고객의 주민등록번호 등 고유식별정보가 포함된 자료를 처리할 수 있습니다. ④ 한전은 다음 각 호의 경우와 고객의 동의가 있는 경우를 제외하고는 고객 개인정보를 이용하거나 제 3 자에게 제공하지 아니합니다.1. 전기공급 및 사용 등 관계업무에 직접 이용하는 경우 2. 법령에 의하여 제 3 자에게 제공하는 경우 ⑤ 고객 개인정보는 수집목적을 달성한 이후에는 폐기하는 것을 원칙으로 합니다. 다만, 상법 등 관련법령의 규정에 의하여 권리의무관계의 확인 등을 위하여 개인정보를 보유할 필요가 있는 경우에는 일정기간동안 보유할 수 있습니다. ⑥ 고객은 개인정보 처리에 관한 정보를 제공받을 수 있으며 관련법령에 의하여 열람청구권 등 개인정보 처리와 관련한 권리를 보장받을 수 있습니다. ⑦ 한전은 고객 개인정보를 처리하는 직원 또는 고객 개인정보의 처리업무를 위탁받은 자가 직무상 알게 된 개인정보를 누설 또는 권한없이 처리하거나 타인의 이용에 제공하는 행위 등 부정한 방법으로 사용하지 않습니다. 전기사용의 안전", "keywords": ["제51조의2", "고객 개인정보의 보호", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제52조", "title": "전기안전의 책임한계", "page": 43, "text": "고객과 한전간의 전기설비에 대한 안전 및 유지보수의 책임한계는 수급지점으로 하며 전원측은 한전이, 고객측은 고객이 각각 책임을 집니다. 다만, 현장설비의 상태나 기술적 요인으로 부득이한 경우에는 고객과 한전이 협의하여 수급지점 이외 지점을 전기안전의 책임한계점으로 할 수 있습니다.", "keywords": ["제52조", "전기안전의 책임한계", "기본공급약관(260401)", "전기안전", "책임한계", "수급지점"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제53조", "title": "전기안전을 위한 고객의 협력", "page": 43, "text": "① 다음 각 호의 어느 하나에 해당할 경우 고객은 그 내용을 지체없이 한전에 통지해야 합니다.1. 인입선, 전기계기 등 전기사용장소 안에 시설한 한전의 전기설비에 이상 또는 고장이 발생하였거나 발생할 우려가 있을 경우 2. 고객의 전기설비에 이상 또는 고장이 발생하였거나 발생할 우려가 있고 그것이 한전의 공급설비에 영향을 미칠 우려가 있을 경우 ② 고객이 한전의 공급설비에 직접 영향을 미칠 물건의 설치, 변경 또는 수리공사를 하고자 할 경우(전기사업법의 기술기준에서 정한 전기안전거리가 부족하게 되는 경우를 포함합니다)에는 그 내용을 미리 한전에 통지해야 하며, 한전은 전기안전을 위하여 특히 필요할 경우 고객에게 공사내용의 변경을 요구할 수 있습니다. ③ 변압기설비를 설치하는 고객은 대한전기협회가 제정한 내선규정의 “수전설비 표준결선도” 및 “옥내의 사용전압과 회로구성”에 적합하도록, 미리 한전과 협의한 후 시설해야 합니다. 이 때 수전용 변압기, 수전용 차단기, 수전용 보호계전기, 수전용 차단기의 전원측 기기 등은 정부 공인기관의 합격품을 사용해야 합니다. ④ 고압 이상의 전압으로 전기를 공급받는 고객으로서 한전이 필요하다고 인정할 경우에는 수급개시전에 수전전력의 차단방법(보호계전방식 및 보호협조 포함) 등을 한전과 협의해야 합니다. ⑤ 고객이 기술기준에 따라 고객과 한전간에 전력보안통신용 전화설비를 시설할 경우에는 한전과 협의후 고객부담으로 시설·소유해야 합니다. ⑥ 고객이 고객소유의 차단기를 설치할 경우에는 고장전류를 안전하고 신속하게 차단할 수 있는 충분한 차단용량의 차단기를 설치하여야 하며, 차단기 설치 이후에 고장전류가 증가하여 차단용량을 초과할 경우에는 고객부담으로 교체하여야 합니다.", "keywords": ["제53조", "전기안전을 위한 고객의 협력", "기본공급약관(260401)", "전기안전", "책임한계", "수급지점"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제54조", "title": "고객소유의 전기설비에 대한 공사", "page": 44, "text": "① 고객소유 전기설비에 대한 공사는 고객이 시공하는 것을 원칙으로 합니다. 다만, 고객의 요청이 있고 전기안전을 위하여 특히 필요할 경우에는 한전이 고객 소유의 전기설비에 대하여 공사를 할 수 있습니다. ② 한전이 제 1 항 단서에 따라 공사를 할 경우에는 실비용을 받습니다. 다만, 세칙에서 정하는 공사는 무료로 할 수 있습니다. 계 약 종 별", "keywords": ["제54조", "고객소유의 전기설비에 대한 공사", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제55조", "title": "계약종별의 구분", "page": 47, "text": "계약종별은 전기사용계약단위의 전기사용 용도에 따라 주택용전력, 일반용전력, 교육용전력, 산업용전력, 농사용전력, 가로등, 예비전력, 임시전력으로 구분합니다.", "keywords": ["제55조", "계약종별의 구분", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제56조", "title": "주택용전력", "page": 47, "text": "① 주택용전력은 다음 중 하나에 해당하는 고객에게 적용합니다.1. 주거용 고객. 다만, 신에너지 및 재생에너지 개발·이용·보급촉진법 제 13 조(신재생에너지설비의 인증 등)에 따라 인증된 지열·공기열 설비는 고객이 희망하는 경우 별도로 분리하여 일반용전력을 적용할 수 있으며, 계약종별의 적용 기준은 세칙으로 정합니다.2. 계약전력 3kW이하의 고객. 다만, 농사용전력, 가로등, 임시전력은 해당 계약종별을 적용합니다.3. 독신자합숙소(기숙사 포함)나 집단주거용 사회복지시설로서 고객이 주택용전력의 적용을 희망할 경우 4. 주거용 오피스텔 고객. 이때 주거용 오피스텔이란 주택은 아니면서 실제 주거용도로 이용되는 오피스텔을 말합니다. ② 주택용전력은 공급전압에 따라 다음과 같이 구분합니다. 1. 저압전력 : 표준전압 110V, 220V, 380V 고객 2. 고압전력 : 표준전압 3,300V이상 고객", "keywords": ["제56조", "주택용전력", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제57조", "title": "일반용전력", "page": 47, "text": "① 일반용전력은 다음 중 하나에 해당하는 고객에게 적용합니다.1. 주택용전력·교육용전력·산업용전력·농사용전력·가로등·예비전력·임시전력이외의 고객 2. 업무용 오피스텔 고객. 이때 업무용 오피스텔이란 업무를 주로 하고 구획 중 일부구획에서 숙식하는 용도로 이용되는 오피스텔을 말합니다. 가. 기존 오피스텔 고객 일반용 전력을 적용받고 있는 기존 오피스텔 고객이 계속하여 일반용전력 계약종별을 적용받고자 하는 경우에는 세칙에서 정하는 바에 따라 일반용전력 계약 종별 해당여부에 대한 확인을 받은 경우에 한하여 일반용전력을 적용합니다. 나. 신규 오피스텔 고객 전기사용계약 성립당시부터 일반용전력 계약종별 해당여부에 대한 확인을 거쳐 일반용전력을 적용합니다.3. 제 56 조(주택용전력) 제 1 항 제 1 호 단서에 따라 일반용전력 적용을 희망하는 고객 ② 일반용전력은 공급전압에 따라 다음과 같이 구분합니다.1. 일반용전력(갑)계약전력 4kW이상 300kW미만의 고객에게 적용하며, 공급전압에 따라 다음과 같이 구분합니다. 가. 저압전력 표준전압 110V·220V·380V 고객나. 고압전력(A) 표준전압 3,300V이상 66,000V이하 고객다. 고압전력(B) 표준전압 154,000V이상 고객 2. 일반용전력(을) 계약전력 300kW이상의 고객에게 적용하며, 공급전압에 따라 다음과 같이 구분합니다. 가. 고압전력(A) 표준전압 3,300V이상 66,000V이하 고객나. 고압전력(B) 표준전압 154,000V이상 고객 ③ 제 2 항에도 불구하고 계약전력 300kW이상 500kW미만 고객이 저압으로 공급받는 경우에는 일반용전력(갑) 저압전력을 적용합니다. ④ 일반용전력(갑) 고압 고객은 별표 1(월간 전기요금표)의 일반용전력(갑)Ⅱ를 적용하며 일반용전력(갑) 고압 고객 중 저압계량하는 고객에 대한 요금적용 등은 세칙에서 정하는 바에 따릅니다.", "keywords": ["제57조", "일반용전력", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제58조", "title": "교육용전력", "page": 48, "text": "① 교육용전력은 계약전력 4kW이상으로 다음 중 하나에 해당하는 고객에게 적용합니다.1. 유아교육법·초중등교육법·고등교육법에 따른 학교(부속병원 제외), 평생교육법에 따른 학력인정 평생교육시설 2. 한국과학기술원법에 따른 한국과학기술원, 광주과학기술원법에 따른 광주과학기술원, 대구경북과학기술원법에 따른 대구경북과학기술원, 울산과학기술원법에 따른 울산과학기술원, 경찰대학설치법에 따른 경찰대학, 사관학교설치법에 따른 육군·해군·공군사관학교, 육군 3 사관학교 설치법에 따른 육군 3 사관학교, 국군간호사관학교설치법에 따른 국군간호사관학교, 국방대학교설치법에 따른 국방대학교, 한국에너지공과대학교법에 따른 한국에너지공과대학교, 공군항공과학고등학교 설치법에 따른 공군항공과학고등학교, 국민 평생 직업능력 개발법에 따른 기능대학, 한국농수산대학교 설치법에 따른 한국농수산대학, 경제자유구역및제주국제자유도시의 외국교육기관설립·운영에 관한 특별법에 따른 학력인정 외국교육기관 3. <삭 제, 2013. 11. 21>4. 도서관법에 따른 도서관 5. 박물관 및 미술관진흥법에 따른 박물관·미술관, 과학관의 설립·운영 및 육성에 관한 법률에 따른 과학관 6. 지방교육자치에 관한 법률 제 32 조의 위임에 따라 시·도 교육청「행정기구 설치 조례」에 의해 교육감이 설치·운영하는 교육감 직속기관으로 세칙에서 정하는 학생 교육원, 학생수련원 등 ② 교육용전력은 공급전압에 따라 다음과 같이 구분합니다.1. 교육용전력(갑) 계약전력 4kW이상 1,000kW미만의 고객에게 적용하며, 공급전압에 따라 다음과 같이 구분합니다. 가. 저압전력 표준전압 110V·220V·380V 고객나. 고압전력(A) 표준전압 3,300V이상 66,000V이하 고객다. 고압전력(B) 표준전압 154,000V이상 고객 2. 교육용전력(을)계약전력 1,000kW이상의 고객에게 적용하며, 공급전압에 따라 다음과 같이 구분합니다. 가. 고압전력(A) 표준전압 3,300V이상 66,000V이하 고객나. 고압전력(B) 표준전압 154,000V이상 고객 ③ 교육용전력은 동일 전기사용계약단위 내의 부대시설을 포함하여 적용합니다. 다만, 사택은 부대시설로 보지 않습니다. ④ 제 2 항에도 불구하고 교육용전력(을) 고객 중 초·중등교육법에 따른 학교는 고객이 희망하는 경우 교육용전력(갑) 고압전력을 적용합니다.", "keywords": ["제58조", "교육용전력", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제59조", "title": "산업용전력", "page": 50, "text": "① 산업용전력은 별표 2(산업용전력 적용대상 기준표)에서 정한 고객에게 적용합니다. ② 산업용전력은 다음과 같이 구분합니다.1. 산업용전력(갑)광업, 제조업 및 기타사업에 전력을 사용하는 계약전력 4kW 이상 300kW 미만의 고객에게 적용하며, 공급전압에 따라 다음과 같이 구분합니다. 가. 저압전력 표준전압 110V·220V·380V 고객나. 고압전력(A)표준전압 3,300V이상 66,000V이하 고객다. 고압전력(B) 표준전압 154,000V이상 고객 2. 산업용전력(을)광업, 제조업 및 기타사업에 전력을 사용하는 계약전력 300kW 이상의 고객에게 적용하며, 공급전압에 따라 다음과 같이 구분합니다. 가. 고압전력(A) 표준전압 3,300V이상 66,000V이하 고객나. 고압전력(B) 표준전압 154,000V 고객다. 고압전력(C) 표준전압 345,000V이상 고객 ③ 제 2 항에도 불구하고 계약전력 300kW 이상 500kW 미만 고객이 저압으로 공급받는 경우에는 산업용전력(갑) 저압전력을 적용합니다. ④ 산업용전력은 동일 전기사용계약단위 내의 부대시설을 포함하여 적용합니다. 다만, 사택은 부대시설로 보지 않습니다. ⑤ 산업용전력(갑) 고압 고객은 별표 1(월간 전기요금표)의 산업용전력(갑)Ⅱ를 적용하며 산업용전력(갑) 고압 고객 중 저압계량하는 고객에 대한 요금적용 등은 세칙에서 정하는 바에 따릅니다.", "keywords": ["제59조", "산업용전력", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제60조", "title": "농사용전력", "page": 51, "text": "① 농사용전력은 전기의 사용 용도에 따라 다음과 같이 구분하여 적용합니다.1. 농사용전력(갑)양곡생산을 위한 양수, 배수(排水)펌프 및 수문조작에 사용하는 전력 2. 농사용전력(을)다음 중 하나에 해당하는 계약전력 1,000kW미만의 고객으로서 농사용전력(갑) 이외의 고객가. 농사용 육묘(育苗) 또는 전조(電照)재배에 사용하는 전력나. 농작물재배·축산·양잠·수산물양식업, 농작물 저온보관시설, 수산업협동조합 또는 어촌계가 단독 소유하여 운영하는 수산물 저온보관시설에 전력을 사용하는 고객으로서 농사용전력(갑) 이외의 고객 다. 농수산물 생산자의 농수산물 건조시설, 수산업협동조합 또는 어촌계가 단독 소유하여 운영하는 수산물 제빙·냉동시설라. 농작물재배·축산·양잠·수산물양식업 고객의 해충 구제(驅除) 및 유인용 전등마. 아래 시설 중 판매 및 유통시설을 제외한 주시설(1) 국가 또는 지자체의 지원금을 받고 농작물(양곡 제외) 또는 임산물 생산자단체가 직접 운영하는 농산물 산지유통센터(APC)(2) 처리대상 물질 중 가축분뇨가 90%이상이며, 축산물 생산자 또는 축산물 생산자 단체가 직접 운영하는 가축분뇨(공동)처리장 (3) 굴생산자 또는 수산물 생산자단체가 직접 운영하는 굴껍질처리장(4) 국가 또는 지자체의 지원금을 받고 수산물 생산자단체가 직접 운영하는 수산물 산지 거점유통센터(FPC) 바. 농사용전력(을)은 공급전압에 따라 다음과 같이 구분합니다.(1) 저압전력 표준전압 110V·220V·380V 고객(2) 고압전력(A) 표준전압 3,300V이상 66,000V이하 고객(3) 고압전력(B) 표준전압 154,000V이상 고객 ② 제 1 항 제 2 호에도 불구하고 계약전력 1,000kW이상으로서 다음 중 하나에 해당하는 고객에게 농사용전력(을)을 적용합니다.1. 제 1 항 제 2 호 “나”목의 수산업협동조합 또는 어촌계가 단독 소유하여 운영하는 수산물 저온보관시설 및 제 1 항 제 2 호 “마”목에 해당하는 고객 2. 농·축·수산물 생산자단체 또는 어촌계가 제 1 항 제 2 호의 농사용전력(을) 용도로 전기를 사용하는 경우. 다만, 제 1 항 제 2 호 “다”목 중 수산업협동조합 또는 어촌계가 단독 소유하여 운영하는 제빙·냉동시설 고객은 제외합니다. ③ <삭 제, 2013. 11. 21>제 61 조 <삭 제, 2005. 12. 28>", "keywords": ["제60조", "농사용전력", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제62조", "title": "가로등", "page": 52, "text": "① 가로등은 다음 중 하나에 해당하는 고객에게 적용합니다. 1. 일반공중의 편익을 위하여 도로·교량·공원 등에 조명용으로 설치한 전등이나 교통신호등·도로표시 9, "text": "고객에 대한 요금은 전기의 수급개시일부터 적용합니다.", "keywords": ["제66조", "요금의 적용 개시시기", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제67조", "title": "요금의 계산", "page": 59, "text": "① 요금은 다음 각 호의 기본요금, 전력량요금, 기후환경요금 및 연료비조정요금의 합계액으로 합니다.1. 기본요금 사용전력량 유무에 관계없이 요금적용전력에 대하여 수급개시일부터 적용하는 요금을 말합니다.2. 전력량요금, 기후환경요금 및 연료비조정요금 사용전력량이 있는 경우 사용전력량에 대하여 부과하는 요금을 말합니다.3. <삭 제, 2014. 6. 17>② 요금은 1 전기사용계약에 대하여 1 개월마다 다음 각 호의 요율에 따라 계산합니다.1. 기본요금과 전력량요금은 별표 1(월간 전기요금표)의 해당 계약종별 요율에 따라 계산합니다.2. 기후환경요금은 사용전력량에 대하여 별표 7(기후환경요금 운영지침)에 따라 계산된 기후환경요금 단가를 곱하여 계산합니다. 3. 연료비조정요금은 사용전력량에 대하여 별표 8(연료비조정요금 운영지침)에 따라 계산된 연료비조정단가를 곱하여 계산합니다. ③고압 이상의 전압으로 전기를 공급받는 아파트(전원주택단지, 주택용전력의 적용을 받는 독신자 합숙소, 기숙사, 집단주거용 사회복지시설포함)의 단일계약방법에 의한 요금계산은 다음와 같습니다.1. 공동설비 사용량을 포함한 전체 사용전력량(주택용전력 이외의 요금을 적용하는 부분이 있는 경우 이를 제외)을 아파트 고객인 경우에는 주택용 전력 적용대상 호수(戶數), 기타 고객인 경우에는 실수(室數)로 나누어서 평균사용량을 산출하고 이에 대한 요금에 주택용전력 적용대상 호수나 실수를 곱한 것을 전체요금으로 합니다.2. 개별 세대 사용량 중 주택용전력 이외의 요금을 적용하는 부분이 있을 경우에는 해당 종별의 고압요금을 적용합니다. ④ 고압 이상의 전압으로 전기를 공급받는 아파트의 종합계약방법 또는 제 25 조(고객 변압기설비 공동이용)에 따라 세대별로 변압기설비 공동이용계약을 체결하는 방법(이하 “아파트 세대별계약방법”라고 합니다.)에 의한 요금계산은 다음과 같습니다.1. 주택용전력 적용대상 호별 사용분은 주택용 저압전력요금을 적용합니다.2. 공동설비 사용분은 일반용전력(갑) 고압전력요금을 적용합니다.3. 주택용전력 이외의 요금을 적용하는 세대가 있을 경우에는 해당 종별의 저압요금을 적용합니다.4. 공동설비 중 교육용전력 적용대상에 대하여는 교육용 고압요금을 적용합니다.5. 아파트 종합계약방법의 전체요금은 세대분 요금과 공동설비 요금을 모두 합산하여 계산합니다. ⑤1 주택에 2 가구 이상이 거주하고 있는 고객(이하 “1 주택수가구”라 합니다)은 한전이 정한 신청서(세칙 별지 3 호 서식)에 필요한 사항을 기재하여 고객이 신청하면 전체 사용전력량을 가구수로 나누어서 1 가구당 평균사용량을 산출하고, 이에 대한 요금에 가구수를 곱하여 요금을 계산합니다. 이 경우 1 주택수가구를 적용받고 있는 고객이 세입자 전출 등 가구수 변동사항이 발생하면 그 변동내용을 한전에 통지하여야 합니다. ⑥요금의 감액은 다음과 같이 적용하며, 제 1 호부터 제 4 호까지의 감액이 중복되는 경우에는 감액요금 중 가장 큰 것만 적용합니다. 다만, 제 2 호의 마목 또는 사목과 제 4 호의 감액이 중복되는 경우 감액요금은 중복하여 적용하되, 제 2 호의 마목 또는 사목을 감액한 후 제 4 호를 적용합니다.1. 제 68 조(요금적용전력의 결정) 제 2 항 또는 제 67 조의 5(주택용 계절별·시간대별 선택요금)를 적용 받는 고객으로서 사용전력량이 없는 월에는 기본요금의 50%를 감액합니다. 다만, 최저요금을 적용하는 주택용전력은 제외합니다.2. 제 56 조(주택용전력) 제 1 항 제 1 호, 제 3 호, 제 4 호 또는 제 57 조(일반용전력)를 적용하는 시설에 거주하는 고객으로서 다음 각 기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제67조의5", "title": "주택용 계절별·시간대별 선택요금", "page": 64, "text": "주택용 계절별·시간대별 선택요금의 적용대상 및 요금적용방법 등은 세칙에서 정하는 바에 따릅니다.", "keywords": ["제67조의5", "주택용 계절별·시간대별 선택요금", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제67조의6", "title": "주택용 에너지캐시백", "page": 64, "text": "주택용 에너지캐시백(전력사용량을 줄인 개별세대에게 전기요금을 감액해주는 제도)의 적용대상, 적용방법 등은 세칙에서 정하는 바에 따릅니다.", "keywords": ["제67조의6", "주택용 에너지캐시백", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제67조의7", "title": "주말 할인요금", "page": 64, "text": "주말 할인요금의 적용대상 및 요금적용방법 등은 세칙에서 정하는 바에 따릅니다.", "keywords": ["제67조의7", "주말 할인요금", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제68조", "title": "요금적용전력의 결정", "page": 64, "text": "① 제 38 조(전력량계 등의 설치기준) 제 2 항 및 제 3 항에 따라 최대수요전력을 계량할 수 있는 전력량계를 설치한 고객(제 16 조(전기사용계약의 해지후 재사용시의 고객부담) 제 1 항에 해당하는 고객 포함)은 검침 당월을 포함한 직전 12 개월 중 12 월분, 1 월분, 2 월분, 7 월분, 8 월분, 9 월분 및 당월분의 최대수요전력 중 가장 큰 최대수요전력을 요금적용전력으로 하며, 가장 큰 최대수요전력이 계약전력의 30% 미만인 경우에는 계약전력의 30%를 요금적용전력으로 합니다. ② 제 1 항 이외의 고객은 계약전력을 요금적용전력으로 합니다. ③ 최대수요전력을 계량할 수 있는 전력량계, 계기용변성기, 계기용변류기 등을 새로 설치하거나 영구 철거하는 경우에는 그 달의 요금계산시 요금적용전력을 구분하여 적용하되, 설치 이전분과 철거 이후분의 요금적용전력은 제 2 항에 따라 결정하고, 설치 이후분과 철거 이전분의 요금적용전력은 제 1 항에 따라 결정합니다. ④ 고객이 제 12 조(전기사용계약자의 변경) 제 3 항에 따라 명의를 변경하거나 업종을 변경하는 경우에는 변경일을 기준으로 최대수요전력계를 새로 설치한 것으로 보고, 변경 전·후로 구분하여 제 1 항에 따라 요금적용전력을 결정합니다. ⑤ 최대수요전력을 계량할 수 있는 전력량계, 계기용변성기, 계기용변류기 등을 임시 철거하거나 재설치하는 경우 요금적용전력은 다음 각 호에 따라 결정합니다. 1. 고장, 재검정, 시험 등을 위하여 임시철거하는 경우에는 고장월을 포함한 직전 12 개월 중 12 월분, 1 월분, 2 월분, 7 월분, 8 월분, 9 월분 및 임시철거월분의 유효하게 시현된 실적 중 최대수요전력을 요금적용전력으로 합니다. 단, 임시철거월분의 유효하게 시현된 실적이 없는 경우 직전월분 실적을 포함하여 산정합니다.2. <삭 제>3. 임시철거기간이 임시철거하는 검침월을 포함하여 3 개월이 경과될 경우에는 넷째월분부터 계약전력을 요금적용전력으로 할 수 있습니다.4. 임시철거하는 검침월을 포함하여 12 개월 이내에 재설치하는 경우에는 제 1 항에 따라 요금적용전력을 결정하며, 12 개월이 경과된 뒤에 재설치하는 경우에는 새로 설치된 것으로 보고 제 3 항에 따라 요금적용전력을 결정합니다.", "keywords": ["제68조", "요금적용전력의 결정", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제69조", "title": "검침일", "page": 65, "text": "① 검침은 각 고객에 대하여 한전이 미리 정한 날(이하 “정기검침일” 이라 합니다)에 실시하는 것을 원칙으로 합니다. 다만, 다음 각호의 경우에는 정기검침일이 아닌 날에 검침할 수 있습니다. 1. 정기검침일이 공휴일인 경우 2. 비상재해 등의 부득이한 경우 ② 제 1 항 제 1 호의 규정에 의한 검침일 변경으로 요금계산 기간을 초과하는 경우에는 초과일수를 포함한 1 일 평균사용량을 산정하여 초과일수만큼 1 일 평균사용량을 차감하고 다음달 사용량으로 이월할 수 있습니다. ③ 한전은 특별한 사정이 있는 경우에는 제 1 항의 규정에도 불구하고 고객의 승낙을 얻어서 매월 검침을 하지 않을 수 있습니다. ④ 제 1 항에도 불구하고 고객이 정기검침일 변경을 희망하는 경우 세칙에 따라 변경할 수 있습니다.", "keywords": ["제69조", "검침일", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제70조", "title": "요금의 계산기간", "page": 65, "text": "요금의 계산은 전월 검침일부터 당월 검침일 전일까지의 기간(이하 “검침기간”이라 합니다)을 기준으로 하며, 제 80 조(일수계산)의 경우를 제외하고는 검침기간을 1 개월로 봅니다.", "keywords": ["제70조", "요금의 계산기간", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제71조", "title": "사용전력량, 무효전력량 및 최대수요전력의 계량", "page": 65, "text": "① 사용전력량은 검침일에 전력량계의 지침을 읽거나 수신함으로써 계량하며, 계량한 사용 전력량을 검침기간의 사용전력량으로 합니다. ② 사용전력량은 공급전압과 같은 전압으로 계량하는 것을 원칙으로 하되, 공급전압과 계량점 전압이 서로 다를 경우에는 사용전력량을 공급전압과 같은 전압으로 계량한 것으로 하기 위한 손실률로 가감합니다. ③ 무효전력량 및 최대수요전력의 계량은 제 1 항 및 제 2 항에 따릅니다.", "keywords": ["제71조", "사용전력량, 무효전력량 및 최대수요전력의 계량", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제72조", "title": "사용전력량 등의 협의 결정", "page": 66, "text": "전력량계와 동 부속장치의 이상(異常), 고장 등으로 사용전력량이 정확하게 계량되지 않았을 경우에는 세칙에서 정한 방법 중에서 가장 적합한 방법으로 요금계산기간의 사용전력량을 고객과 한전이 협의하여 결정합니다. 이 때 계기용 변성기 이상으로 사용전력량을 고객과 한전이 협의 결정하는 경우에는 최대수요전력을 다시 산정합니다.", "keywords": ["제72조", "사용전력량 등의 협의 결정", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제73조", "title": "시간대별로 구분 계량할 수 있는 전력량계 설치고객의 사용전력량 협의 결정", "page": 66, "text": "시간대별로 구분하여 계량할 수 있는 전력량계가 설치된 고객이 다음 중의 하나에 해당하는 경우에는 요금 계산기간의 사용전력량을 고객과 한전이 협의하여 결정합니다.1. 전력량계와 동 부속장치의 이상(異常)·고장 등으로 사용전력량이 정확히 계량되지 않았을 경우 2. 전력량계의 시간이 표준시간과 ±15 분 이상 차이나는 경우 3. 계절이 변할 때 전력량계의 표시일이 별표 3(계절별·시간대별 구분표)에서 규정한 계절변경일과 ±1 일 이상 차이나는 경우", "keywords": ["제73조", "시간대별로 구분 계량할 수 있는 전력량계 설치고객의 사용전력량 협의 결정", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제74조", "title": "요금의 납부의무 및 납기일", "page": 66, "text": "① 고객의 요금 납부의무는 다음에서 정한 날에 발생합니다.1. 전력량계를 설치한 고객은 정기검침일 2. 정액제 요금을 적용하는 고객은 그 고객이 속한 검침구역의 정기 검침일 3. 전기사용계약이 해지된 경우에는 해지일 ② 요금은 제 1 항의 납부의무 발생일 다음날부터 한전이 고객별로 지정한 날(이하 “납기일”이라 합니다)까지 납부해야 합니다. 다만, 세칙에서 별도로 정하는 경우에는 납기일을 달리 정할 수 있습니다. 한전은 납기일의 7 일 전까지 요금청구서를 고객에게 송달합니다. ③ 소액 전기요금은 세칙에서 정하는 바에 따라 다음 번 요금 청구시 합산하여 청구할 수 있습니다. ④ 1 고객이 여러 개의 전기사용계약을 체결한 때에는 고객이 희망하는 경우 요금 납기일별로 통합하여 청구할 수 있습니다. ⑤ 주거용주택용 고객은 세칙이 정하는 바에 따라 전기요금을 분할납부 할 수 있습니다.", "keywords": ["제74조", "요금의 납부의무 및 납기일", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제74조의2", "title": "요금에 대한 이의신청", "page": 67, "text": "고객은 한전을 방문하거나 우편, 팩시밀리, 인터넷, 전화의 방법으로 요금청구 내역에 대해 이의를 신청할 수 있으며, 한전은 이의신청을 받은 날로부터 30 일 이내에 이에 대한 결과를 고객에게 통지합니다.", "keywords": ["제74조의2", "요금에 대한 이의신청", "기본공급약관(260401)", "신청", "접수", "계약", "approval", "요금", "청구", "납부", "연체", "이의신청", "objection"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제75조", "title": "연체료", "page": 67, "text": "고객이 요금을 제 74 조(요금의 납부의무 및 납기일)의 납기일을 경과하여 납부하는 경우에는 납기일 다음날부터 납부일까지를 연체일수로 다음 각호에 따라 계산하여 합산한 연체료를 부담해야 하며, 연체료는 다음번 청구요금에 가산하여 청구할 수 있습니다. 1. 처음 1 개월 연체료 = 미납요금 × 1. 5% × 연체일수월력(月曆)일수 2. 다음 1 개월 연체료 = 미납요금 × 1. 5% × 연체일수월력(月曆)일수", "keywords": ["제75조", "연체료", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제76조", "title": "요금의 재계산에 따른 환불 및 추가청구", "page": 67, "text": "① 요금을 잘못 계산하였을 경우에는 재계산한 요금과 잘못 계산한 요금과의 차액을 당월분 요금에서 가감하는 것을 원칙으로 하며, 요금을 재계산한 경우에도 요금 납기일은 변경되지 않습니다. ② 한전의 잘못으로 요금을 과다청구하여 납부한 요금을 환불하는 경우에는 세칙이 정하는 바에 따라 지급합니다. ③ 한전이 요금을 과소청구하여 추가로 요금을 청구하는 경우에 고객은 세칙이 정하는 바에 따라 요금을 분할납부할 수 있고, 한전은 분할납부에 따른 이자를 가산하여 청구합니다. 다만, 한전의 잘못으로 요금을 과소청구한 경우에는 분할납부에 따른 이자를 가산하지 않습니다.", "keywords": ["제76조", "요금의 재계산에 따른 환불 및 추가청구", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제77조", "title": "요금 등의 납부방법", "page": 68, "text": "① 전기요금 및 시설부담금 등의 납부는 한전의 예금계좌로 이체하는 방법(이하 “계좌이체”라 합니다)을 원칙으로 합니다. 다만, 부득이한 경우 세칙에서 별도로 정하는 방법으로 납부할 수 있습니다. ② 전기요금의 청구 및 납부방법에 따른 전기요금 감액은 세칙에서 별도로 정합니다. ③ 한전은 고객이 제 12 조(전기사용계약자의 변경) 제 3 항에 따른 정산요금을 납부하지 않은 경우 당해 고객의 새로운 전기사용장소에서 청구되는 요금에 포함하여 청구할 수 있습니다.", "keywords": ["제77조", "요금 등의 납부방법", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제78조", "title": "선수금", "page": 68, "text": "① 한전은 고객의 희망에 따라 장래 요금에 충당할 수 있도록 선수금을 받을 수 있습니다. ② 선수금에 대하여는 이자를 지급하며, 이자율은 아래와 같습니다.1. 선납기간이 3 개월 이하인 경우에는 시중은행 보통예금 이자율 2. 선납기간이 3 개월 초과 2 년 미만인 경우에는 시중은행 1 년 만기 정기예금 이자율 평균, 2 년 이상인 경우에는 시중은행 2 년 만기 정기예금 이자율 평균", "keywords": ["제78조", "선수금", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제79조", "title": "요금의 보증", "page": 68, "text": "① 한전은 다음 중의 하나에 해당하는 고객에게 수급개시, 재사용 또는 공급계속의 조건으로 예상월액 요금의 3 개월분(요금납부 실적이 있는 경우에는 최근 1 년이내의 기간 중 보증설정일로부터 가까운 정상가동월 기준으로 산정한 3 개월분 요금)에 상당하는 금액을 기준으로 보증조치를 요구할 수 있습니다. 다만, 제 56 조(주택용전력) 제 1 항 제 1 호에 해당하는 고객에게는 특별히 필요하다고 인정되는 경우를 제외하고는 보증조치를 요구하지 않습니다.1. 임시전력을 사용하는 고객 2. 요금 미납으로 제 15 조(고객의 책임으로 인한 전기사용계약의 해지) 제 1 항에 따라전기사용계약의 해지가 있었던 고객 3. 제 8 조(전기사용신청) 제 3 항에 따라 소유자가 아닌 사용자 명의로 전기사용을 신청하는 고객. 이 경우 주택용전력 고객, 소상공인기본법 제 2 조에 따른 소상공인, 계약전력 50kW이하 개인고객, 계약전력 20kW이하 법인고객 및 세칙에서 정한 신용이 우수한 개인고객은 제외합니다. 4. 전기사용장소, 고객 신용상태 등 요금납부에 대한 보증이 필요한 경우 ② 보증은 현금예치, 이행보증보험에 의한 보증, 지급보증, 연대보증, 근저당설정 또는 선납형 전력량계 부설 등의 방법 중 하나의 방법으로 한전과 고객이 협의하여 결정합니다. ③ 보증기간은 아래와 같습니다. 1. 제 1 항 제 1 호·제 4 호의 보증기간은 전기사용계약 해지일까지로 합니다. 2. 제 1 항 제 2 호의 보증기간은 2 년이내로 하되 2 년 중 3 회이상 요금연체가 있었던 경우에는 보증기간이 2 년이내로 다시 연장될 수 있습니다. 3. 제 1 항 제 3 호의 보증기간은 1 년이내로 하되, 1 년 중 2 회이상 요금연체가 있었던 경우에는 보증기간이 위의 제 2 호와 같이 연장될 수 있습니다. ④ 연대보증의 보증기간을 제 3 항 단서에 따라 연장할 때에는 보증인의 동의를 받습니다. ⑤ 현금으로 예치한 보증금은 이자를 지급하며 이자율은 아래와 같습니다. 1. 보증기간이 2 년미만인 경우에는 시중은행 1 년 만기 정기예금 이자율 평균, 보증기간이 2 년이상인 경우에는 시중은행 2 년 만기 정기예금 이자율 평균 2. 보증기간 만료 후의 예치기간에 대하여는 시중은행 보통예금 이자율 3. 제 1 호 및 제 2 호의 이자율은 매년 6 월과 12 월에 산정 후 다음 달 1 일부터 적용합니다.", "keywords": ["제79조", "요금의 보증", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제80조", "title": "일수계산(日數計算", "page": 69, "text": ")요율변경 등 세칙에서 정한 경우에는 요금을 사용일수에 따라 구분 계산합니다.", "keywords": ["제80조", "일수계산(日數計算", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제81조", "title": "전력사용의 휴지 등", "page": 69, "text": "① 다음 중의 하나에 해당할 경우에는 고객의 신청에 따라 전기사용계약기간 중 휴지(休止)할 수 있으며, 휴지기간 중에는 요금을 받지 않습니다.1. 농사용전력 2. 별표 2(산업용전력 적용대상 기준표)의 기타사업 중 농사용전력 요금을 적용하지 않는 “농업, 임업 및 어업”과 농·축·수산물의 “건조, 냉동 및 저온보관 고객” 3. 유수지 배수펌프장 4. 도로 결빙방지 전기설비 5. 산업통상자원부장관이 전기사용을 중지 또는 제한하는 전기기계기구 ② 일정 계약전력 이하의 농사용전력 고객은 휴지 또는 재사용을 생략하고 한전에서 별도로 정하는 바에 따라 사용전력량이 있는 달에만 요금을 받습니다. ③ 휴지기간이 1 년을 초과하는 고객과 1 년간 사용전력량이 없는 계약전력 3kW 이하 고객에 대해서는 한전은 고객에게 통지하고 전기사용의사가 없는 경우 전기사용계약을 해지할 수 있습니다.", "keywords": ["제81조", "전력사용의 휴지 등", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제82조", "title": "전기요금 이외 부담금 등의 병기청구", "page": 70, "text": "한전은 다음 각 호에 정하는 부담금 등을 전기요금과 함께 청구할 수 있으며, 업무처리는 별도로 정하는 바에 따릅니다.1. 전기사업법 제 51 조에 따라 전기요금으로부터 분리청구되는 전력산업기반기금 2. 방송법 제 64 조에 따른 TV수신료 3. 녹색프리미엄 4. 전기사업법 시행령 제 19 조 제 1 항 제 3 호에 따라 전기사용자에게 청구하는 제 3 자간 전력거래에 의한 요금 시설부담금", "keywords": ["제82조", "전기요금 이외 부담금 등의 병기청구", "기본공급약관(260401)", "요금", "청구", "납부", "연체"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제83조", "title": "공사비 부담의 일반원칙", "page": 73, "text": "① 고객이 새로 전기를 사용하거나 계약전력(정액제요금 고객은 사용설비를 말합니다)을 증가시키는 경우 또는 고객의 희망에 따라 공급설비를 변경하는 경우에 배전선로 공사비는 이 약관에서 정하는 바에 따라 고객과 한전이 부담합니다. ② 제 1 항에 따라 고객이 부담하는 배전선로 공사비를 시설부담금이라 하며, 수급개시일 이후에는 전기사용계약을 해지하거나 계약전력을 감소하는 등의 경우에도 고객이 납부한 시설부담금을 환불하지 않습니다. ③ 송전선로 및 변전소 안의 한전 소유설비에 대한 공사비는 다음 각 호의 1 에 해당하는 경우를 제외하고 한전이 부담합니다. 1. 제 23 조 제 3 항 제 4 호에 따라 고객이 변전소 건설장소를 제공하는 경우 2. 고객의 요청으로 변전소 안의 공급설비를 변경하는 경우. 이 경우 송전선로 공사비는 한전이 부담하고, 변전소 안의 한전 소유설비 공사비는 고객이 부담합니다.", "keywords": ["제83조", "공사비 부담의 일반원칙", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제84조", "title": "일반공급설비의 시설부담금", "page": 73, "text": "① 고객이 새로 전기를 사용하거나 계약전력을 증가시켜 일반공급설비로 전기를 공급받는 경우에는 공사발생 유무 및 공사내역에 관계없이 제 93 조(표준시설부담금의 산정)에 따라 산정한 금액(이하 “표준시설부담금”이라 합니다)을 부담합니다. 다만, 다음 각 호의 1 에 해당하는 경우에는 제 96 조(저압설계조정시설부담금) 또는 제 97 조(22,900V 특별고압설계조정시설부담금)에 따라 산정한 금액(이하 “설계조정시설부담금”이라 합니다)을 부담합니다.1. 한전이 철탑(鐵塔)이나 해저(海底)케이블을 시설하여 22,900V 이하의 전압으로 공급하는 경우 2. 공중배전지역에서 고객의 희망에 따라 지중배전선로를 설치하여 전기를 공급하는 경우. 이 경우 설계조정시설부담금이 표준시설부담금보다 적을 경우에는 표준시설부담금을 적용합니다.3. 제 62 조(가로등) 제 2 항 제 1 호에 해당하는 사용설비 1kW미만의 고객으로서 다른 공급설비의 신설이나 변경이 수반되지 않고 한전이 인입선만 설치하여 공급하는 경우. 이 경우에도 설계조정시설부담금이 표준시설부담금보다 많을 경우에는 표준시설부담금을 적용합니다. 4. 기타 특별한 사정으로 설계조정시설부담금을 적용하는 것이 타당하다고 한전이 인정하는 경우 ② 농어촌전기공급사업촉진법에 따라 전기를 공급받는 고객은 표준시설부담금과 설계조정시설부담금 중 적은 것을 부담합니다. 다만, 제 1 항 단서에 해당되는 경우에는 그에 따릅니다. ③ 주택단지·산업단지 기타 이와 유사한 단지를 조성하기 위하여 단지 밖의 기존공급설비로부터 단지경계지점까지 새로이 시설하는 일반공급설비(이하 “전기간선시설”이라 합니다) 및 단지안에 기간이 되는 배전선로(이하 “단지내 배전시설”이라 합니다)를 미리 설치하는 경우의 공사비는 제 1 항 및 제 2 항에도 불구하고 원칙적으로 사업주체가 부담합니다. ④ 고객의 전기사용신청시 제 88 조(법령의 규정에 의한 공사비 부담) 제 1 항에 따라 한전에서 공사비를 부담하여 설치한 배전선로에서 22,900V 이하의 일반공급설비로 전기를 공급하는 경우에는 표준시설부담금을 부담합니다.", "keywords": ["제84조", "일반공급설비의 시설부담금", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제85조", "title": "특별공급설비의 시설부담금", "page": 74, "text": "① 고객이 새로 전기를 사용하거나 계약전력을 증가시킴에 따라 다음 각호의 1 에 해당하는 전기공급설비를 설치하여 공급하는 경우에는 당해 고객에게 전기를 공급하기 위한 설계시설부담금을 부담합니다.1. 전용공급설비 2. 고객의 희망에 따라 기술기준 또는 한전 설계기준 등을 초과하여 설치하는 공급설비 3. 22,900V를 초과하는 특별고압으로 설치하는 공급설비 ② 일반공급설비로 전기를 공급받고 있는 고객에게 기존의 일반공급설비를 특별공급설비로 변경하거나 새로이 특별공급설비를 설치하여 전기를 공급하는 경우에는 당해 설비를 새로 설치하는 것으로 간주하여 산정한 설계시설부담금에서 공급설비 변경전에 부담한 시설부담금을 뺀 금액을 부담합니다.", "keywords": ["제85조", "특별공급설비의 시설부담금", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제86조", "title": "임시공급설비의 시설부담금", "page": 74, "text": "① 임시전력 고객이 새로 전기를 사용하거나 계약전력을 증가시킴에 따라 임시공급설비를 새로 설치하거나 변경하여 전기를 공급하는 경우에는 해당 고객에게 전기를 공급하기 위한 설계시설부담금을 부담합니다. 다만, 고객이 임시전력 사용을 종료한 후 임시전력 이외의 계약종별(이하 “상시전력” 이라 합니다)로 변경할 것이 명확히 예상되고, 임시전력 사용신청시 고객이 희망할 경우에는 상시전력으로 보고 시설부담금을 적용할 수 있습니다. ② 현장여건상 임시공급설비의 설치가 쉽지 않거나 수급지점의 수시 변경이 예상되는 경우로서 한전이 필요하다고 인정하는 경우에는 임시전력을 공급받기 위한 전기설비를 고객이 설치하고 소유할 수 있습니다.", "keywords": ["제86조", "임시공급설비의 시설부담금", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제87조", "title": "예비공급설비의 시설부담금", "page": 75, "text": "①예비공급설비를 설치하여 전기를 공급하는 경우의 시설부담금은 상용전력 공급설비의 시설부담금과 별도로 산정합니다. 이 경우 예비공급설비 시설부담금 산정방법은 상용전력 공급설비 시설부담금 산정방법에 준합니다. 다만, 저압 예비공급설비를 설치하여 전기를 공급받는 예비전력 고객에 대하여는 설계시설부담금을 적용합니다. ②예비전력과 상용전력을 공급하기 위한 설비를 동일설계로 공사하는 경우에는 상용전력 공급설비에 대한 시설부담금을 먼저 산정한 후 제 1 항에 따라 산정한 시설부담금을 부담합니다.", "keywords": ["제87조", "예비공급설비의 시설부담금", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제88조", "title": "법령의 규정에 의한 공사비부담", "page": 75, "text": "① 제 84 조(일반공급설비의 시설부담금) 제 3 항에도 불구하고 법령에 특별히 명시된 경우 공사비의 전부 또는 일부를 한전이 부담하여 설치할 수 있습니다. ② 제 1 항의 경우에 사업주체는 공중 또는 지중 전선로의 설치장소를 제공하여야 합니다.", "keywords": ["제88조", "법령의 규정에 의한 공사비부담", "기본공급약관(260401)"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제89조", "title": "공급설비의 변경에 따른 시설부담금", "page": 75, "text": "①고객이 동일 전기사용장소에서 공급방식·공급전압의 변경, 전기사용계약단위의 분할·합병, 공급선로나 수급지점의 변경, 전기사용계약단위간 계약전력 이전을 희망(소유자가 동일한 경우)하는 경우에는 다음 각 호의 어느 하나에 따라 산정된 시설부담금을 산정합니다.1. 일반공급설비로 전기를 공급받는 고객가. 공급설비 변경전과 변경후를 각각 신설하는 것으로 보고 산정한 표준시설부담금 차액을 부담합니다. 다만, 공급설비 변경후의 시설부담금이 변경전의 시설부담금보다 적거나 전기사용계약단위의 합병(전기를 공급한 후 1 년 이후에 한합니다)에도 불구하고 계약전력이 증가하지 않는 경우에는 시설부담금이 없는 것으로 합니다. 나.“가”에도 불구하고 고객이 공급선로나 수급지점의 변경을 희망하는 경우에는 설계조정시설부담금을 부담합니다. 2. 특별공급설비 또는 임시공급설비로 전기를 공급받는 고객 해당 공급설비를 변경하기 위한 설계시설부담금을 부담합니다.3. 고압 이상의 전압으로 전기를 공급받고 있는 아파트고객이 각 호별 저압공급을 희망할 경우에는 공급설비 변경 전과 변경 후를 각각 신설하는 것으로 보고 산정한 표준시설부담금 차액과 설계조정시설부담금 중 적은 것을 부담합니다. ② 고객의 희망에 따라 인입선 위치를 변경하거나 전기계기의 설치장소를 변경하는 경우에는 제 1 항에도 불구하고 설계시설부담금을 부담합니다. ③ 제 1 항 및 제 2 항에 따라 산정한 시설부담금이 새로이 전기를 사용하는 것으로 보고 산정한 시설부담금보다 큰 경우에는 새로이 전기를 사용하는 것으로 보고 산정한 시설부담금을 적용합니다.", "keywords": ["제89조", "공급설비의 변경에 따른 시설부담금", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제90조", "title": "공동시설부담금의 분담", "page": 76, "text": "① 저압으로 전기를 공급받는 고객간, 고압으로 전기를 공급받는 고객간 또는 22,900V 특별고압으로 전기를 공급받는 고객간 등 같은 전압으로 공급받는 2 이상의 고객으로부터 동시 또는 서로 전후하여 전기사용신청이 있고, 신증설 공급설비의 일부 또는 전부를 공용할 경우에 한전은 그 공용하는 설비에 대한 시설부담금을 “공동시설부담금”으로 하여 표준시설부담금 적용대상 고객은 호수(戶數)로, 설계시설부담금 또는 설계조정시설부담금 적용대상 고객은 신증설 계약전력 비례로 배분합니다. 다만, 공동시설부담금의 배분에 대하여 고객간에 별도 합의가 있을 경우에는 그에 따릅니다. ② 2 이상의 고객이 대표자에 의해서 공동으로 전기의 사용을 신청한 경우에는 각 고객이 공급설비의 일부 또는 전부를 공용하는 때에도 공동시설부담금을 배분하지 않습니다.", "keywords": ["제90조", "공동시설부담금의 분담", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제91조", "title": "고객소유의 전기설비를 한전설비에 설치하는 경우의 시설부담금", "page": 76, "text": "한전 소유의 전주, 지중관로, 전력구를 이용하여 고객소유의 전기설비를 설치하는 경우에는 그 이용부분을 새로 설치하는 것으로 간주하여 산정한 설계시설부담금을 부담합니다. 다만, 발전소 또는 변전소 구내에 설치되어 있는 지중관로나 전력구를 이용하는 경우에 그 부분에 대하여는 시설부담금을 받지 않습니다.", "keywords": ["제91조", "고객소유의 전기설비를 한전설비에 설치하는 경우의 시설부담금", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제92조", "title": "시설부담금의 납부시기 및 정산", "page": 76, "text": "① 고객은 공급준비 착수전에 한전이 지정한 수납기관에 시설부담금 전액을 납부해야 합니다. 다만, 시설부담금의 납부가 명확히 예상되고 한전이 필요하다고 인정하는 경우에는 세칙에서 정하는 바에 따라 분할하여 납부할 수 있습니다. ② 한전은 공사준공 후 시설부담금을 정산합니다. 다만, 표준시설부담금은 정산하지 않습니다. ③ 공급설비의 일부 또는 전부를 설치한 후 고객의 사정으로 전기사용을 개시하지 않고 전기사용계약을 해제 또는 변경하였을 경우와 공급설비 공사를 하지 않았을 때라도 측량, 설계 등의 비용이 발생하였을 경우에는 한전은 이미 받은 시설부담금에서 공급설비의 설치 및 철거에 소요된 비용과 기타 발생비용을 세칙에서 정하는 바에 따라 차감한 후 그 잔액을 고객에게 환불합니다. ④한전이 시설부담금 정산차액을 고객에게 환불하는 경우에는 환불대상 금액에 납부일부터 환불 전날까지의 이자(利子)를 더하여 환불하며, 이때 이자는 시중은행 보통예금의 이자율로 계산하여 지급합니다. 다만, 이자 계산기간이 1 년 이상인 경우에는 정기예금 이자율로 이자를 계산하여 지급합니다. ⑤ 한전이 시설부담금 정산차액을 고객에게 추가로 청구하는 경우에는 고객은 제 1 항 단서조항에 따라 분할하여 납부할 수 있습니다.", "keywords": ["제92조", "시설부담금의 납부시기 및 정산", "기본공급약관(260401)", "요금", "청구", "납부", "연체", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제93조", "title": "표준시설부담금의 산정", "page": 77, "text": "① 저압, 고압 또는 22,900V 이하의 특별고압으로 전기를 공급받는 고객의 표준시설부담금은 계약전력 및 공사거리에 따라 별표 4(표준시설부담금 단가표)의 단가를 적용하여 산정한 기본시설부담금과 거리시설부담금의 합계액으로 합니다. ② 기본시설부담금은 배전선로 공사 발생 유무 및 공사내역에 관계없이 신설 또는 증설분 계약전력에 별표 4(표준시설부담금 단가표)의 기본시설부담금 단가를 곱한 금액으로 합니다. ③ 거리시설부담금은 제 94 조(표준시설부담금 산정거리의 측정)에 따라 산정한 거리가 공중 배전선로는 200m, 지중 배전선로는 50m(이하 “기본거리”라 합니다)를 초과하는 경우에 적용하며, 신설거리시설부담금과 첨가거리시설부담금을 합한 금액으로 합니다. 다만, 신설거리와 첨가거리가 혼재하는 경우 및 공중 배전선로와 지중 배전선로가 혼재하는 경우의 거리시설부담금은 세칙에서 정하는 바에 따릅니다. ④ 신설거리시설부담금은 제 94 조(표준시설부담금 산정거리의 측정)에 따라 산정한 신설거리에서 기본거리를 공제한 후의 거리에 별표 4(표준시설부담금 단가표)의 신설거리시설부담금 단가를 곱한 금액으로 하고, 첨가거리시설부담금은 제 94 조(표준시설부담금 산정거리의 측정)에 따라 산정한 첨가거리에서 기본거리를 공제한 후의 거리에 별표 4(표준시설부담금 단가표)의 첨가거리시설부담금 단가를 곱한 금액으로 합니다.", "keywords": ["제93조", "표준시설부담금의 산정", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제94조", "title": "표준시설부담금 산정거리의 측정", "page": 78, "text": "① 제 93 조(표준시설부담금의 산정)에 따라 거리시설부담금을 산정할 때의 기준이 되는 거리(이하 “표준시설부담금 산정거리”라 합니다)는 다음 각호와 같이 적용합니다.1. 신설거리는 수급지점으로부터 측정기점까지의 지표상의 직선거리로 합니다. 다만, 지중으로 전기를 공급받는 고객의 경우에는 수급지점으로부터 측정기점까지의 배전선로 실거리로 합니다.2. 첨가거리는 삼상으로 전기를 공급하기 위하여 기존 단상 배전선로에 전선을 첨가하는 공사(이하 “첨가공사”라 합니다) 구간의 실거리로 합니다. 다만, 인입선에 전선을 첨가하는 경우에는 첨가거리로 보지 않습니다. ② 제 1 항의 “측정기점”은 수급지점에서 가장 가까운 위치의 전원이 있는 다음 각 호의 배전선로를 기준으로 결정합니다. 1. 공중배전선로로 전기를 공급받는 고객가. 저압고객 : 22,900V이하의 전원이 있는 전주 등의 지지물나. 22,900V 특별고압고객 : 6,600V이상 22,900V이하의 전원이 있는 전주 등의 지지물다. “가” 및 “나”의 적용시 첨가공사를 하는 경우에는 첨가공사가 끝나는 전주를 측정기점으로 하며, 첨가공사 구간에 대하여는 첨가거리를 적용합니다.2. 지중배전선로로 전기를 공급받은 고객가. 저압고객 : 지중배전용 다회로개폐기·다회로차단기, 지중배전용 변압기, 공급전압이 같은 전선의 접속점, 맨홀 또는 핸드홀. 다만, 삼상으로 전기를 공급받는 고객은 삼상 전원이 있는 공급설비를 측정기점으로 합니다. 나. 22,900V 특별고압 고객 : 6,600V이상 22,900V이하의 지중 배전용 다회로개폐기·다회로차단기, 지중배전용 삼상변압기, 맨홀 또는 핸드홀 3. 예비공급설비를 설치하여 전기를 공급받는 고객예비공급설비를 설치하여 전기를 공급받는 고객은 제 1 호 및 제 2 호에 따라 적용(상용전력 공급변전소와 다른 변전소에서 공급받기 위한 예비전력(을)의 경우에는 예비전력 공급 변전소의 전원이 있는 배전선로만을 측정기점으로 적용)합니다. 다만, 당해고객의 상용전력 공급설비는 측정기점에서 제외합니다. ③ 동일설계로 공사하는 2 호 이상 고객의 표준시설부담금 산정거리는 다음 각 호의 어느 하나와 같이 측정합니다. 다만, 배전선로 실연장 지점이 서로 다를 경우에는 연장지점별로 별개의 집단고객으로 봅니다. 1. 22,900V 특별고압 또는 저압으로 전기를 공급받는 고객이 동일설계로 공사하는 경우에는 그 중에서 가장 높은 전압으로 공급받는 고객에 대한 표준시설부담금 산정거리를 먼저 측정하고, 다른 고객에 대하여는 먼저 측정한 고객에게 공급하기 위한 배전선로가 이미 설치되어 있는 것으로 보고 순차적으로 표준시설부담금 산정거리를 측정합니다.2. 같은 전압으로 공급받는 고객간에는 측정기점에서 가장 가까운 고객부터 1 호씩 순차적으로 제 1 호에 준하여 표준시설부담금 산정거리를 측정합니다. ④ 제 1 항부터 제 3 항까지의 규정 적용시 제 36 조(전용공급설비)에 의한 전용공급설비는 표준시설부담금 산정거리 측정기점으로 결정하지 아니합니다.", "keywords": ["제94조", "표준시설부담금 산정거리의 측정", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제95조", "title": "표준시설부담금 단가의 조정", "page": 79, "text": "한전은 주요자재 가격 및 노임단가의 변동으로 다음 제 1 호의 조정방법에 의한 조정률(A)이 ±5% 이상일 경우에는 별표 4(표준시설부담금 단가표)의 표준시설부담금 단가를 조정률 범위 내에서 조정할 수 있습니다.1. 조정방법A = 자재가격 변동률 + 노임단가 변동률 자재가격 변동률 = (fw×W)＋(ft×T)＋(fs×S)＋(fc×C)＋(fp×P)＋(fi×I) 노임단가 변동률 = (fd×D)＋(fl×L)＋(fu×U)＋(fo×O)(주) A : 조정률 fw : 전선 및 케이블 가격 변동률 W : 전선 구성비(20. 6%) ft : 변압기 가격 변동률 T : 변압기 구성비(17. 2%) fs: 전기회로개폐 및 접속장치 가격 변동률 S : 개폐기 구성비(6. 6%) fc: 콘크리트제품 가격 변동률 C : 콘크리트제품 구성비(13. 2%) fp: 플라스틱제품 가격 변동률 P : 플라스틱제품 구성비(13. 2%) fi: 철강제품 가격 변동률 I : 철강제품 구성비(0. 8%) fd: 배전전공 단가 변동률 D : 배전전공 구성비(20. 7%) fl: 배전활선전공 단가 변동률 L : 배전활선전공 구성비(4. 0%) fu: 지중케이블전공 단가 변동률 U: 지중케이블전공 구성비(1. 9%) fo: 보통인부 단가 변동률 O: 보통인부 구성비(11. 3%)2. 조정 기준자재가격은 한국은행 또는 통계청에서 조사한 매년 9 월의 생산자 물가지수를 적용하며, 노임단가는 대한건설협회 건설업 임금실태 조사보고서의 매년 하반기 시중노임 단가를 적용합니다.", "keywords": ["제95조", "표준시설부담금 단가의 조정", "기본공급약관(260401)", "시설부담금", "공사비", "contribution"]}, {"doc": "basic", "docName": "기본공급약관(260401)", "clause": "제96조", "title": "저압 설계조정시설부담금", "page": 80, "text": "저압으로 전기를 공급받는 고객의 설계조정시설부담금은 다음 각 호와 같이 산정합니다.1. 새로 설치하는 공급설비에 대하여 해당고객에게 전기를 공급하기 위한 설계시설부담금을 기준으로 하여 변압기, 배전함, 관로 공사비는 다음과 같이 해당고객이 이용하는 비율만큼 조정하여 산정합니다. ○ 설계조정시설부담금(원) = 해당 고객에게 전기를 공급하기 위한 설계시설부담금 - (A+B) + (A1+B1) A = 변압기 또는 배전함 설치공사비 A1 = A × 신ㆍ증설 계약전력(kW)변압기 또는 배전함 용량(kVA) B = 관로설치공사비 B 할수있습니다. 이때요금및그밖의수급조건은변경된약관을적용합니다.", "keywords": ["제3조", "약관의 인가 및 변경", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제4조", "title": "약관의 준수 등", "page": 5, "text": "①고객과한전은이약관을준수하여야하며, 이약관에명시되지않은사항은고객과한전이협의하여결정합니다. ②한전은이약관의시행을위하여필요한때에는이약관의취지에따라세부시행절차등을정하여운영할수있습니다.", "keywords": ["제4조", "약관의 준수 등", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제5조", "title": "약관 이외의 수급조건의 적용", "page": 5, "text": "한전은특별한사정이있는경우산업통상자원부장관의인가를받아이약관이외의보완공급요금및수급조건을적용할수있습니다. 2", "keywords": ["제5조", "약관 이외의 수급조건의 적용", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제6조", "title": "정의", "page": 6, "text": "이약관에서사용하는용어는다음과같이정의합니다.1. “보완공급”이라함은전기사업법제 16 조의 3[구역전기사업자와전기판매사업자의전력거래등]의규정에따라고객이생산한전력이부족하거나남는경우에한전이그전력을공급하거나수전하는것을말합니다.2. “보완전력”이라함은한전측에서수급지점을통해고객측으로공급되는전력을말하며, 그에따른요금을“보완전력요금”이라합니다.3. “역송전력”이라함은고객측에서수급지점을통해한전측으로공급되는전력을말하며, 그에따른요금을“역송전력요금”이라합니다.4. “보완공급구역”이란고객이전기사업법제 7 조[사업의허가]의규정에따라구역전기사업의허가를받은구역을말합니다.5. “보완공급요금”이라함은“보완전력요금”과“역송전력요금”을총칭하여말합니다.6. “수급지점”이라함은고객과한전이전력을거래하는지점으로서한전측전기설비와고객측전기설비가연결되는지점을말합니다.7. “보완공급설비”라함은보완공급을하기위해한전의전기공급설비로부터고객의전기설비에이르기까지의전선로와이에속하는개폐장치및기타의부속설비로서한전이소유하는전기설비를말합니다.8. “예비보완공급설비”라함은보완공급설비의고장또는기타의사유로상용보완공급설비를사용할수없게되었을경우, 대체사용하기위해예비로설치하는보완공급설비를말합니다.9. “전용보완공급설비”라함은변전소로부터특정고객의전기설비에이르기까지해당특정고객이전용(專用)하기위한보완공급설비로서, 한전이소유하는설비를말합니다.10. “지역냉난방구역전기사업자”란집단에너지사업법시행령제 2 조제 1 항제 1 호에해당하는사업자중전기사업법제 92 조의 2 ②항에따라허가의간주를받은구역전기사업자를말한다.11. “산업단지구역전기사업자”란집단에너지사업법시행령제 2 조제 1 항제 2 호에해당하는사업자중전기사업법제 92 조의 2 ②항에따라허가의간주를받은구역전기사업자를말한다. 3 12. “계약전력”이라함은변압기설비, 최대수요전력또는합성최대수요전력을기준으로고객과한전이협의하여산정한용량에따라계약한전력으로, 고객이수급지점을통해수전또는송전할수있는최대전력을말합니다.13. “최대수요전력”이라함은고객이수급지점을통해 15 분마다수전한전력의최대치(㎾)를말합니다.14. “요금적용전력”이라함은기본요금을산정할때적용되는전력을말합니다.15. “합성최대수요전력”이라함은구역전기사업자의공급구역내용도별최대수요전력의합을부등률로나누어산출한최대전력으로서, 구역전기사업허가조건인‘공급구역내수요전력의 60%이상공급능력확보’에해당하는전력을말합니다.", "keywords": ["제6조", "정의", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제7조", "title": "끝수 계산", "page": 7, "text": "①이약관에서보완공급요금등의계산에사용하는단위는다음과같습니다. 이때계산단위미만의끝수는계산단위이하첫째자리에서반올림합니다. 구 분 계 산 단 위사 용 설 비변 압 기 설 비계 약 전 력요 금 적 용 전 력최 대 수 요 전 력보 완·역 송 전 력 량무 효 전 력 량역 률전 기 계 기 의 오 차 율 1kW1kVA1kW1kW1kW1kWh1kVarh1%0. 1%②보완공급요금등의청구금액(부가세포함)에 10 원미만의끝수가있을경우에는국고금관리법제 47 조제 3 항에따라그끝수는계산하지않습니다. 4", "keywords": ["제7조", "끝수 계산", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제8조", "title": "보완공급의 신청", "page": 8, "text": "①고객이새로이보완공급을희망하거나보완공급을변경하고자하는경우에는[별표 3]의보완공급신청서에필요한사항을기재하여신청(이하“보완공급신청”이라합니다)하여야합니다. ②제 1 항의규정에의한보완공급신청은고객이직접한전에방문하여신청하거나, 우편또는인터넷등을이용하여신청할수있습니다. ③고객은보완공급신청시[별표 6]의수전설비및발전설비특성자료를제출하여야합니다. 다만, 자료가확정되지않은경우에는잠정자료를제출할수있으며, 자료가확정되면지체없이확정된자료를제출하여야합니다. ④지역냉난방구역전기사업자가전기사업법시행령제 19 조제 4 항제 3 호에따라해지후 1 년이내에보완공급계약을재개하고자하는경우보완공급개시희망일부터 1 개월전까지서면으로한전에알려야하며새로이보완공급계약서를작성하지않고해지전의보완공급계약서에따를수있습니다.", "keywords": ["제8조", "보완공급의 신청", "보완공급약관(2026.03.16부)", "신청", "접수", "계약", "approval", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제9조", "title": "보완공급의 승낙", "page": 8, "text": "①고객이보완공급을신청하는경우에는한전은보완공급을승낙합니다. 다만, 다음중의하나에해당하는경우에는보완공급신청의일부또는전부를거절할수있습니다.1. 법령에따라전기공급을제한할경우 2. 산업통상자원부장관의명령이있을경우 3. 전기수급상황에따라공급능력이없는경우 4. 전기공급설비의상황에따라부득이한경우 5. 이약관이외의조건으로보완공급신청이있을경우 6. 전기를대량사용하고자하는고객이아래에정하는시기까지[별표 7]의전력수전예정통지서에의거한전에보완공급을요청(내용 5 이변경될경우를포함합니다)하지않은경우가. 계약전력 5,000kW이상 10,000kW미만: 사용예정일 1 년전나. 계약전력 10,000kW이상 100,000kW미만: 사용예정일 2 년전다. 계약전력 100,000kW이상 300,000kW미만: 사용예정일 3 년전라. 계약전력 300,000kW이상: 사용예정일 4 년전 ②한전은제 1 항제 3 호, 제 4 호규정에따라보완공급을거절할경우에는산업통상자원부장관의승인을받아시행합니다.", "keywords": ["제9조", "보완공급의 승낙", "보완공급약관(2026.03.16부)", "신청", "접수", "계약", "approval", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제10조", "title": "계약의 성립 및 계약기간", "page": 9, "text": "①고객과한전간의보완공급계약또는변경계약은보완공급계약또는변경계약을체결한날부터효력이발생합니다. ②계약기간은보완공급계약을체결한날로부터요금적용개시일이후 1 년이되는날까지로합니다. 다만, 고객이계약기간을특별히정하여계약체결을희망할경우에는고객과한전이협의하여정할수있습니다. ③계약기간만료이전에보완공급계약의해지또는변경이없을경우보완공급계약은계약기간만료후에도 1 년마다동일한조건으로계속되는것으로합니다.", "keywords": ["제10조", "계약의 성립 및 계약기간", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제10조의2", "title": "전력시장 거래요건", "page": 9, "text": "지역냉난방구역전기사업자가전기사업법시행령제 19 조제 4 항제 3 호에따라산업통상자원부장관이정하는기간동안전력시장과전력거래하는경우보완공급설비는접속설비로보고한전의송·배전용전기설비이용규정을적용합니다.", "keywords": ["제10조의2", "전력시장 거래요건", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제10조의3", "title": "발전기 준공전 조기수요 전력공급", "page": 9, "text": "전기사업법시행규칙제 17 조의 3 제 3 항에따른소요전력은보완공급계약상계약종별의요금표를적용합니다.", "keywords": ["제10조의3", "발전기 준공전 조기수요 전력공급", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제11조", "title": "계약의 변경", "page": 9, "text": "보완공급계약기간중에보완공급계약의변경이필요할경우에는고객과한전이협의하여변경할수있습니다. 6", "keywords": ["제11조", "계약의 변경", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제12조", "title": "명의변경 및 권리의무의 승계", "page": 10, "text": "①합병및인수, 상속등으로고객의명의에변경이있을경우, 신고객은명의를변경하여보완공급을계속받을수있습니다. 이때신고객은한전에대한보완공급과관련하여구고객이갖고있던모든권리의무를승계합니다. ②매매등으로고객의변동이있고신고객이명의변경에따른고객별보완공급요금의정산을희망할경우한전은변경일을기준으로신·구고객별로구분하여정산할수있습니다. 이경우고객은변경일 7 일전까지한전에신청하여야합니다. ③제 1 항및제 2 항의규정에의한명의변경신청은문서로하여야합니다.", "keywords": ["제12조", "명의변경 및 권리의무의 승계", "보완공급약관(2026.03.16부)", "명의변경", "계약자변경", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제13조", "title": "고객의 요청에 따른 보완공급계약의 해지", "page": 10, "text": "고객이보완공급계약을해지하고자할경우는해지희망일 1 개월전까지서면으로한전에알려야하며, 한전은원칙적으로해지희망일에보완공급을끝내기위한조치를취합니다. 다만, 한전의책임이아닌사유로해지희망일에보완공급을끝내기위한조치를취하지못할경우에는그조치를완료한날에보완공급계약이해지됩니다.", "keywords": ["제13조", "고객의 요청에 따른 보완공급계약의 해지", "보완공급약관(2026.03.16부)", "해지", "종료", "termination", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제14조", "title": "고객의 요청에 따른 계약전력의 감소", "page": 10, "text": "고객의요청에따라계약전력을감소시킬경우에는제 13 조[고객의요청에따른보완공급계약의해지]의규정에준하여처리합니다.", "keywords": ["제14조", "고객의 요청에 따른 계약전력의 감소", "보완공급약관(2026.03.16부)", "계약전력", "kW", "수요전력", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제15조", "title": "고객의 책임으로 인한 보완공급계약의 해지", "page": 10, "text": "①한전은고객이보완전력요금을납기일부터 1 개월이되는날까지납부하지않을경우에는보완공급계약을해지할수있습니다. 이때한전은해지예정일 7 일전까지고객에게요금납부를최고합니다. ②한전은제 31 조[고객의책임으로인한보완공급의정지]의규정에따라보완공급이정지된고객이정지일부터 10 일이내에그사유를해소하지않을경우에는보완공급계약을해지할수있습니다. ③제 1 항의규정에따라보완공급계약이해지된고객이미납된보완전력요금을납부하지않고다른장소에서보완공급계약을신청하는경우에 7 한전은이를거절할수있으며, 이미다른장소에서보완공급계약이있는경우에는그계약을해지할수있습니다.", "keywords": ["제15조", "고객의 책임으로 인한 보완공급계약의 해지", "보완공급약관(2026.03.16부)", "해지", "종료", "termination", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제16조", "title": "보완공급계약 해지후 재공급", "page": 11, "text": "①제 13 조[고객의요청에따른보완공급계약의해지]또는제 15 조[고객의책임으로인한보완공급계약의해지]의규정에따라보완공급계약을해지하였다가해지사유를해소하고해지된날로부터 1 년이내에동일전기설비로동일보완공급구역에서동일고객이재공급을받고자할경우에는해지기간에대하여는“해지이전의계약전력을적용한기본요금”(이하“해지기간기본요금”이라합니다)을부담하여야합니다. 단, 지역냉난방구역전기사업자가전기사업법시행령제 19 조제 4 항제 3 호에따라산업통상자원부장관이정하는전력시장과의전력거래기간을준수한경우에는해당기간에대하여“해지기간기본요금”을부담하지않으나해당전력거래기간을단축하거나 1 년의범위내에서연장하여전력시장과거래후보완전력재공급을요청한경우에는해당기간전체에대하여“해지기간기본요금”을부담합니다. ②제 14 조[고객의요청에따른계약전력의감소]의규정에따라계약전력을감소시켰다가 1 년이내에다시계약전력을증가하고자할경우에는계약전력감소기간에대하여계약전력감소이전의계약전력을적용한기본요금을부담하여야합니다. ③재공급시의수급조건이해지이전의수급조건과달라시설부담금이추가되는경우에는그시설부담금을추가로부담해야합니다.", "keywords": ["제16조", "보완공급계약 해지후 재공급", "보완공급약관(2026.03.16부)", "해지", "종료", "termination", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제17조", "title": "보완공급계약 해지후의 채권 채무", "page": 11, "text": "한전과고객사이에발생한보완공급요금및기타채권·채무는보완공급계약의해지로는소멸되지않습니다. 제 2 절 보완공급계약의 기준", "keywords": ["제17조", "보완공급계약 해지후의 채권 채무", "보완공급약관(2026.03.16부)", "해지", "종료", "termination", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제18조", "title": "보완공급계약 및 보완공급의 단위", "page": 11, "text": "①고객과한전은 1 보완공급구역에대하여 1 보완공급계약을체결합니다. 다만, 예비보완공급설비를설치하는고객등기술적기타부득이한사 8 유가있는경우에는고객과한전이협의하여 2 이상의보완공급계약을체결할수있습니다. ②한전은 1 보완공급계약에대하여 1 전압,1 인입및 2 계량(보완전력용과역송전력용으로구분)으로보완공급을합니다. 다만, 기술적기타부득이한사유가있는경우에는고객과한전이협의하여인입또는계량방법을달리할수있습니다.", "keywords": ["제18조", "보완공급계약 및 보완공급의 단위", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제19조", "title": "계약전력의 결정", "page": 12, "text": "①고객의계약전력은보완공급용 1 차변압기설비용량의합계로합니다. 다만,2 단계이상의변압시설을가진고객으로서, 고객이희망하는경우에는 2 차변압기설비용량의합계를계약전력으로할수있으며, 이경우 2 차변압기의 1 차측전압과동일전압의부하설비가있는경우에는그부하설비용량을합산합니다. 다만,154㎸이상의전압으로공급받는고객중고객이희망하는경우에는최대수요전력을기준으로고객과한전이협의하여계약전력을결정할수있으며,154㎸미만의전압으로공급받는고객은구역전기사업허가조건에따라산출된구역내합성최대수요전력을기준으로고객과한전이협의하여결정할수있습니다. ②부하설비나변압기설비중다른설비와동시에사용할수없도록교대성설비또는예비설비가설치되어있는경우에는그중에서용량이큰쪽의부하설비나변압기설비를기준으로계약전력을결정할수있습니다. 제 3 절 보완공급의 방법 및 공사", "keywords": ["제19조", "계약전력의 결정", "보완공급약관(2026.03.16부)", "계약전력", "kW", "수요전력", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제20조", "title": "보완공급의 개시", "page": 12, "text": "①한전은고객으로부터보완공급신청이있을경우에는고객과협의하여보완공급개시일을정하고공급을위한조치를완료한후지체없이보완공급을개시합니다. 다만, 고객이다음중의하나에해당하는경우에는그이행또는시정후에보완공급을개시합니다.1. 시설부담금을지정한기일까지납부하지않은경우 2. 보완전력요금, 위약금및보증금등을납부하지않은경우 9 3. 법령이정한바에따른점검결과가기술기준에적합하지않은경우 ②한전은천재지변, 인·허가지연, 민원또는용지사정등부득이한사유로인하여미리정한보완공급개시일에보완공급을할수없게될경우에는그이유를알리고고객과협의하여보완공급을개시합니다.", "keywords": ["제20조", "보완공급의 개시", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제21조", "title": "전기공급방식, 주파수 및 전압", "page": 13, "text": "수급지점에서의표준주파수는 60Hz로하며, 전기공급방식및보완공급전압은전기사업법제 16 조[전기의공급약관]의규정에따라한전이산업통상자원부장관의인가를받은 (이하“ ”이라합니다)제 23 조[전기공급방식, 공급전압및주파수]의규정을준용합니다.", "keywords": ["제21조", "전기공급방식, 주파수 및 전압", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력", "전압", "주파수", "supply voltage"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제22조", "title": "수급지점 및 전기안전관리 책임한계", "page": 13, "text": "①보완공급에따른전기설비의시설및그시설물의안전관리, 설비운영및유지보수관리의책임한계는수급지점을기준으로고객측전기설비는고객이, 한전측전기설비는한전이각각그책임을집니다. ②제 1 항의수급지점은보완공급구역내의한지점으로하되한전전선로에서가장가까운거리에있는지점을기준으로고객과한전이협의하여결정합니다. 다만, 전용보완공급설비또는 22,900V를초과하는전압으로전기를공 ": 15, "text": "①고객과한전은보완공급설비또는고객전기설비에전기적인고장이발생하였을때, 고장이확대·파급되지않도록한전의“발전기병렬운전연계선로보호업무편람”·“분산형전원배전계통연계기술기준”등에따라관련보호장치·차단기·제어장치의설치·정정·시험·운영에대하여상호협의하고, 그협의된사항을이행하여야합니다. ②고객은필요한경우, 한전에변전소인출차단기의자동재폐로기능의정지또는활성화를요구할수있으며, 이에따른세부적인사항은고객과한전이협의하여정합니다.", "keywords": ["제26조", "보호장치의 설치 및 운영 협조", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제27조", "title": "피해방지장치 등의 설치", "page": 15, "text": "①고객은다음중하나의원인으로다른전기사용자의전기사용을방해하거나방해할우려가있는경우또는보완공급에지장을주거나줄우려가있을경우에는고객의부담으로한전과협의하여조정장치나피해방지장치를설치하여야하며, 특히필요한경우에는보완공급설비를변경하거나전용보완공급설비를설치한후보완공급을받아야합니다.1. 각상간의부하가현저하게평형을잃을경우 2. 전압이나주파수가현저하게변동하는경우 12 3. 고조파발생등파형에현저한왜곡이발생하는경우 4. 기타상기에준하는경우 ②부득이한사유로보완공급이중지되거나급격한전압변동또는결상등으로경제적손실이발생할우려가있는고객은무정전전원공급장치(UPS), 결상보호장치, 정전경보장치등적절한자체보호장치를설치할필요가있습니다.", "keywords": ["제27조", "피해방지장치 등의 설치", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제28조", "title": "토지 및 건물의 출입", "page": 16, "text": "①한전은보완공급설비의설치, 유지보수, 안전관리, 수급조건의확인및검사, 시험을위해필요한경우에는고객의토지및건물에출입할수있습니다. ②한전이제 1 항의규정에따라고객의토지또는건물에출입하고자할때에는미리고객의승낙을받아야합니다. 이때고객은정당한사유가없는한출입을승낙해야합니다.", "keywords": ["제28조", "토지 및 건물의 출입", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제29조", "title": "역률의 유지", "page": 16, "text": "①고객은보완전력의역률을 92%(이하“기준역률”이라합니다)이상으로유지하되, 진상역률(進相力率)이되지않도록하여야합니다. ②보완전력을사용하지않은달의역률과무효전력을계량할수있는전력량계를설치하지않은고객의역률은지상역률(遲相力率)92%로보며, 무효전력을계량할수있는전력량계가설치된고객은전력량계에의하여 30 분단위로누적된계량값으로역률을계산합니다. 다만, 원격검침이되지않는고객은전력량계에 1 개월간누적된계량값으로역률을계산합니다. ③역률에따른요금의추가또는감액대상고객은무효전력을계량할수있는전력량계가설치된고객으로역률에따른요금의추가또는감액은다음각호와같이시간대별로구분하여산정합니다.1. 08 시부터 22 시까지의역률에따른요금의추가또는감액가. 지상역률(遲相力率)에대하여적용하며, 평균역률이 92%에미달하는경우에는미달하는역률 60%까지매 1%당기본요금의 0. 2%를추가하고, 평균역률이 92%를초과하는경우에는역률 97%까지초 13 과하는매 1%당기본요금의 0. 2%를감액합니다. 나.“가”의평균역률은제 2 항의본문에따라계산된 30 분단위의역률을 1 개월간평균하여계산합니다. 다만,30 분단위의역률이지상역률 60%에미달하는경우역률 60%로지상역률 97%를초과하는경우역률 97%로간주하여 1 개월간평균역률을계산합니다. 다.“나”에도불구하고, 제 2 항의단서에해당하는고객의평균역률은전력량계에 1 개월간누적된계량값으로역률을계산합니다.2. 22 시부터다음날 08 시까지의역률에대한요금의추가가. 진상역률(進相力率)에대하여적용하며, 평균역률이 95%에미달하는경우에미달하는매 1%당기본요금의 0. 2%를추가합니다. 나.“가”의평균역률은제 2 항의본문에따라계산된 30 분단위의역률을 1 개월간평균하여계산합니다. 다만,30 분단위의역률이진상역률 60%에미달하는경우에는역률 60%로, 지상역률인경우에는역률 100%로간주하여 1 개월간평균역률을계산합니다. 다.“나”에도불구하고, 제 2 항의단서에해당하는고객은진상역률요금을적용하지않습니다. ④해당월에지상역률또는진상역률의추가요금이발생한경우첫번째달에는추가요금의청구를예고하고두번째달부터추가요금을청구합니다.", "keywords": ["제29조", "역률의 유지", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제30조", "title": "위약금", "page": 17, "text": "고객이이약관을위반하여보완전력요금의일부나전부가정당하게계산되지않았을경우한전은정당하게계산되지않은금액의 3 배를한도로위약금을받습니다. 다만, 동일고객이직전위약금부과일로부터 1 년이내에전기설비를개조, 변조, 조작하는등의방법으로부정하게전기를사용함으로써요금이정당하게계산되지않은경우에는최대 5 배까지위약금을받을수있습니다. 이때보완전력요금이정당하게계산되지않은기간을확인할수없을경우에는 6 개월이내에서고객과한전이협의하여결정합니다.", "keywords": ["제30조", "위약금", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제31조", "title": "고객의 책임으로 인한 보완공급의 정지", "page": 17, "text": "14 ①고객이다음중의하나에해당할경우에는그고객에대한보완공급을즉시정지할수있습니다. 다만제 4 호의경우에는공급정지 7 일전까지미리통보합니다.1. 고객의책임으로전기안전에긴박한위험이발생한경우 2. 고객이한전의전기설비를고의로손상하거나망실하여한전에중대한손해를끼친경우 3. 전기설비를개조, 변조, 훼손및조작(造作)하여부정하게전기를사용한경우 4. 요금이외의한전에납부해야할금액(제 51 조[보증금]을포함합니다)을지정한날까지납부하지않은경우 ②고객이다음중의하나에해당하고한전에서그사유의해소를요청해도시정하지않을경우에는그고객에대한보완공급을정지할수있습니다.1. 고객의책임으로전기안전에위험이있는경우 2. 고의나중대한과실로한전의전기공급을저해하거나저해할우려가있는경우 3. 한전과계약한부하설비및변압기설비이외의설비로보완공급을받는경우 4. 제 27 조[피해방지장치등의설치]제 1 항에따른조정장치나피해방지장치를설치하지않은경우 5. 제 28 조[토지및건물의출입]의규정에따른한전직원의출입을정당한이유없이거절한경우 6. 제 29 조[역률의유지]의규정에따른적정용량을초과하는콘덴서를부설하여진상역률이되는경우 7. 법령에의하여시·도지사그밖의행정기관의장이보완공급정지를요청하는경우 ③제 1 항및제 2 항의규정에따라보완공급을정지한경우에는보완전력요금을감액하지않습니다.", "keywords": ["제31조", "고객의 책임으로 인한 보완공급의 정지", "보완공급약관(2026.03.16부)", "보완공급", "구역전기사업", "역송전력"]}, {"doc": "supp", "docName": "보완공급약관(2026.03.16부)", "clause": "제32조", "title": "보완공급정지의 해제 및 재사용 수수료", "page": 18, "text": "①한전은제 31 조[고객의책임으로인한보완공급의정지]의규정에따라 15 보완공급을정지한경우로서고객이보완공급계약이해지되기이전에그사유를해소하고한전에납부해야하는위약금, 손해배상금및기타금액을납부하였을때에는지체없이보완공급을재개합니다. ②제 13 조[고객의요청에따른보완공급계약의해지]및제 15 조[고객의책임으로인한보완공급계약의해지], 제 31 조[고객의책임으로인한보완공급의정지]의규
